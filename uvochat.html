<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>UVOchat</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Reset & dasar */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            animation: backgroundShift 15s infinite alternate;
        }
        @keyframes backgroundShift {
            0% { background: #121212; }
            50% { background: #1a1a2e; }
            100% { background: #121212; }
        }
        header {
            background: #1f1f1f;
            padding: 0.7rem 1.5rem;
            font-size: 1.4rem;
            color: #0ff;
            font-weight: 700;
            position: relative;
            user-select: none;
            flex-shrink: 0;
            box-shadow: 0 4px 15px rgba(0, 255, 255, 0.2);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center; /* Tetap di tengah */
        }
        #back {
            position: absolute;
            top: 50%;
            left: 15px; /* Pindah ke kiri */
            transform: translateY(-50%);
            background: transparent;
            color: #0ff;
            border: 2px solid #0ff;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background-color 0.3s, color 0.3s, transform 0.2s;
            z-index: 10;
            display: none; /* Sembunyikan secara default, akan diatur oleh JS jika ada history */
        }
        #back:hover {
            background-color: #0ff;
            color: #121212;
            transform: translateY(-50%) scale(1.05);
        }
        #whatsapp-button {
            position: absolute;
            top: 50%;
            right: 15px;
            transform: translateY(-50%);
            background: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.3s, transform 0.2s;
            z-index: 10;
        }
        #whatsapp-button:hover {
            background-color: #1DA851;
            transform: translateY(-50%) scale(1.05);
        }
        #whatsapp-button img {
            width: 18px;
            height: 18px;
        }

        /* Sidebar */
        #sidebar {
            height: 100%;
            width: 0;
            position: fixed;
            z-index: 20;
            top: 0;
            left: 0;
            background-color: #1f1f1f;
            overflow-x: hidden;
            transition: 0.5s;
            padding-top: 60px;
            box-shadow: 2px 0 10px rgba(0, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        #sidebar .closebtn {
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 36px;
            margin-left: 50px;
            color: #0ff;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
        }
        #sidebar .closebtn:hover {
            color: white;
        }
        #sidebar-content {
            text-align: center;
            padding: 0 20px; /* Tambah padding agar teks tidak terlalu mepet */
        }
        #sidebar-content p {
            font-size: 1.2rem;
            margin-bottom: 5px;
            color: #eee;
        }
        #sidebar-content .version {
            font-size: 0.9rem;
            color: #aaa;
        }
        #sidebar-content .developer {
            font-size: 0.8rem;
            color: #777;
        }
        #sidebar-menu-items {
            list-style: none;
            width: 100%;
            padding: 20px 0;
            border-top: 1px solid #333;
            margin-top: 20px;
        }
        #sidebar-menu-items li {
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            color: #eee;
            font-size: 1.1rem;
            text-align: left;
        }
        #sidebar-menu-items li:hover {
            background-color: #333;
        }
        #sidebar-menu-items li.active {
            background-color: #00ffff55;
            color: black;
            font-weight: 600;
        }


        #open-sidebar-btn {
            position: absolute;
            top: 50%;
            left: 15px;
            transform: translateY(-50%);
            background: transparent;
            color: #0ff;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 11;
            padding: 5px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        #open-sidebar-btn:hover {
            background-color: rgba(0, 255, 255, 0.1);
        }

        /* Tidak ada margin-left untuk konten utama saat sidebar terbuka */
        #chat, #input-area, #disclaimer {
            transition: none; /* Hapus transisi margin-left */
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            scroll-behavior: smooth;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 1;
        }
        .bubble {
            max-width: 85%;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            position: relative;
            animation: fadeInUp 0.4s ease forwards;
            box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
            line-height: 1.5;
            font-size: 0.95rem;
            word-wrap: break-word;
            user-select: text;
        }
        .bubble p {
            margin-bottom: 0.5em;
        }
        .bubble p:last-child {
            margin-bottom: 0;
        }
        .bubble ul {
            padding-left: 1.5em;
            margin-top: 0.5em;
        }
        .bubble li {
            margin-bottom: 0.3em;
        }
        .bubble strong {
            font-weight: 700;
            color: #00ffff;
        }
        .bubble .large-font {
            font-size: 1.1em;
            font-weight: 600;
        }
        .bubble .small-font {
            font-size: 0.85em;
            opacity: 0.8;
        }
        .bubble .icon {
            margin-right: 5px;
        }
        .bubble .box {
            background-color: rgba(0, 255, 255, 0.1);
            border: 1px solid #0ff;
            border-radius: 8px;
            padding: 0.6em 0.8em;
            margin-top: 0.8em;
            display: inline-block;
            font-size: 0.9em;
            box-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .user {
            background: #333;
            color: #eee;
            align-self: flex-end;
            margin-left: auto;
            border-bottom-right-radius: 2px;
            box-shadow: 0 0 8px #00fff0aa;
        }
        .ai {
            background: #00fff055;
            color: #000;
            align-self: flex-start;
            margin-right: auto;
            border-bottom-left-radius: 2px;
            box-shadow: 0 0 15px #00fff099;
        }
        .typing {
            font-style: italic;
            color: #aaa;
            background: transparent !important;
            box-shadow: none !important;
            text-align: left;
            padding-left: 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }
        .typing .dot-flashing {
            position: relative;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #0ff;
            color: #0ff;
            animation: dotFlashing 1s infinite linear alternate;
            animation-delay: 0.5s;
            margin-left: 10px;
        }
        .typing .dot-flashing::before, .typing .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
        }
        .typing .dot-flashing::before {
            left: -15px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #0ff;
            color: #0ff;
            animation: dotFlashing 1s infinite linear alternate;
            animation-delay: 0s;
        }
        .typing .dot-flashing::after {
            left: 15px;
            width: 10px;
            height: 10px;
            border-radius: 5px;
            background-color: #0ff;
            color: #0ff;
            animation: dotFlashing 1s infinite linear alternate;
            animation-delay: 1s;
        }

        @keyframes dotFlashing {
            0% { background-color: #0ff; }
            50%, 100% { background-color: rgba(0, 255, 255, 0.2); }
        }

        #input-area {
            display: flex;
            padding: 0.7rem 1rem;
            background: #1f1f1f;
            border-top: 1px solid #333;
            gap: 0.6rem;
            flex-shrink: 0;
            box-shadow: 0 -4px 15px rgba(0, 255, 255, 0.1);
        }
        input[type="text"] {
            flex: 1;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            background: #2a2a2a;
            color: white;
            outline: none;
            box-shadow: inset 0 0 5px rgba(0, 255, 255, 0.3);
            transition: background-color 0.3s, box-shadow 0.3s;
            min-width: 0;
        }
        input[type="text"]:focus:not(:disabled) {
            background: #3a3a3a;
            box-shadow: inset 0 0 8px rgba(0, 255, 255, 0.6), 0 0 5px rgba(0, 255, 255, 0.8);
        }
        input[disabled] {
            opacity: 0.6;
            cursor: not-allowed;
        }
        button {
            background: #0ff;
            border: none;
            border-radius: 10px;
            padding: 0 1.3rem;
            color: black;
            font-weight: 700;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.2s;
            user-select: none;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
        button:hover:not(:disabled) {
            background: #00dddd;
            transform: scale(1.05);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: scale(1);
        }

        #disclaimer {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            padding: 0.5rem 1rem;
            background: #1f1f1f;
            border-top: 1px solid #333;
            flex-shrink: 0;
        }

        /* Scrollbar keren */
        #chat::-webkit-scrollbar {
            width: 8px;
        }
        #chat::-webkit-scrollbar-track {
            background: #1f1f1f;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #0ff;
            border-radius: 10px;
        }

        /* Media Queries untuk desktop/tablet */
        @media (min-width: 768px) {
            body {
                max-width: 600px;
                margin: 0 auto;
                border-left: 1px solid #333;
                border-right: 1px solid #333;
                box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
                border-radius: 10px;
                overflow: hidden;
            }
            #sidebar {
                position: relative; /* Buat sidebar bagian dari layout, tidak menimpa */
                width: 250px;
                padding-top: 20px; /* Atur ulang padding top */
                flex-shrink: 0; /* Mencegahnya menyusut */
            }
            body {
                flex-direction: row; /* Layout berdampingan */
            }
            #main-content {
                display: flex;
                flex-direction: column;
                flex-grow: 1; /* Biarkan konten utama mengisi sisa ruang */
                height: 100%;
            }
            header {
                padding: 0.8rem 1.5rem;
                font-size: 1.5rem;
            }
            #chat {
                padding: 1.5rem;
            }
            .bubble {
                max-width: 75%;
                padding: 1rem 1.2rem;
                font-size: 1rem;
            }
            .typing {
                font-size: 0.95rem;
            }
            #input-area {
                padding: 0.8rem 1.5rem;
            }
            input[type="text"] {
                padding: 0.9rem 1.2rem;
            }
            button {
                padding: 0 1.5rem;
            }
            #open-sidebar-btn {
                display: none; /* Sembunyikan tombol hamburger di desktop */
            }
            #back {
                display: block !important; /* Tampilkan tombol kembali di desktop secara default */
            }
            #whatsapp-button {
                right: 15px; /* Pastikan posisi tombol WhatsApp di desktop */
            }
        }

        /* Atur posisi tombol di HP */
        @media (max-width: 767px) {
            #back {
                left: unset; /* Hapus `left` bawaan */
                right: 80px; /* Geser ke kanan agar ada ruang untuk hamburger */
            }
            #open-sidebar-btn {
                display: block; /* Tampilkan tombol hamburger di HP */
            }
            header {
                padding-left: 60px; /* Beri ruang di header untuk tombol hamburger */
            }
            body.sidebar-open #main-content { /* Overlay untuk menutup konten utama saat sidebar terbuka */
                pointer-events: none;
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar">
        <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
        <div id="sidebar-content">
            <p><strong>UVOchat</strong></p>
            <p class="version">Model UVO - 1</p>
            <p class="developer">By ADITdeveloper</p>
        </div>
        <ul id="sidebar-menu-items">
            <li id="new-chat-btn">Mulai Chat Baru</li>
            <li id="history-header">Riwayat Chat</li>
            </ul>
    </div>

    <div id="main-content">
        <header>
            <button id="open-sidebar-btn" onclick="openNav()">&#9776;</button>
            <button id="back" onclick="history.back()">⬅ Kembali</button>
            UVOchat
            <a href="https://wa.me/6285648211278" target="_blank" id="whatsapp-button">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp Icon">
                WA
            </a>
        </header>
        <div id="chat"></div>
        <div id="input-area">
            <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." disabled autocomplete="off" />
            <button id="sendBtn" disabled>Kirim</button>
        </div>
        <div id="disclaimer">
            UVOchat dapat membuat kesalahan. Periksa info penting.
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const backButton = document.getElementById('back');
        const newChatButton = document.getElementById('new-chat-btn');
        const historyList = document.getElementById('sidebar-menu-items');
        const historyHeader = document.getElementById('history-header');
        let aiTyping = false;

        let uvochatData = null;
        let gamesData = null;

        let chatHistory = []; // Array untuk menyimpan riwayat chat
        let currentChatIndex = -1; // Indeks chat yang sedang aktif

        // Fungsi untuk mengontrol Sidebar
        function openNav() {
            document.getElementById("sidebar").style.width = "250px";
            document.body.classList.add('sidebar-open'); // Tambahkan kelas untuk overlay
        }

        function closeNav() {
            document.getElementById("sidebar").style.width = "0";
            document.body.classList.remove('sidebar-open'); // Hapus kelas overlay
        }

        // Fungsi untuk memproses teks: bold, spasi, simbol, ukuran font, box
        function processText(text) {
            let processed = text;

            // 1. Ganti **teks** menjadi <strong>teks</strong>
            processed = processed.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

            // 2. Ganti spasi ganda menjadi spasi tunggal dan tambahkan paragraf
            processed = processed.replace(/\n/g, '<br>'); // Ganti newline jadi <br> dulu
            // Convert multiple <br> into single <br>
            processed = processed.replace(/(<br\s*\/?>\s*){2,}/g, '<br><br>');

            // 3. Tambahkan simbol (contoh: untuk list)
            processed = processed.replace(/^- (.*?)<br>/g, '<li><span class="icon">➡️</span>$1</li>'); // Untuk list item
            processed = processed.replace(/^- (.*)/g, '<li><span class="icon">➡️</span>$1</li>'); // Jika tidak ada <br>

            // Tambahkan <ul> di sekitar <li> jika ada
            if (processed.includes('<li>')) {
                processed = `<ul>${processed}</ul>`;
                // Remove redundant <br> before or after <ul>
                processed = processed.replace(/<br><ul>/g, '<ul>').replace(/<\/ul><br>/g, '</ul>');
            }


            // 4. Atur ukuran font (contoh: jika ada kalimat kunci)
            // Ini bisa diperluas dengan regex yang lebih kompleks
            processed = processed.replace(/Gampang banget!/g, '<span class="large-font">Gampang banget!</span>');
            processed = processed.replace(/Cepat, kan?/g, '<span class="small-font">Cepat, kan?</span>');
            processed = processed.replace(/Simpel banget kan?/g, '<span class="small-font">Simpel banget kan?</span>');

            // 5. Tambahkan kotak (contoh: untuk instruksi khusus)
            // Anda bisa definisikan pola untuk menambahkan kotak, misalnya dengan [[teks]]
            processed = processed.replace(/\[\[(.*?)\]\]/g, '<span class="box">$1</span>');

            // Wrap di <p> jika belum ada struktur list
            if (!processed.includes('<ul>') && !processed.includes('<br><br>')) {
                processed = `<p>${processed}</p>`;
            } else {
                // Untuk teks yang memiliki <br><br> (paragraf terpisah), wrap masing-masing blok di <p>
                const blocks = processed.split('<br><br>');
                processed = blocks.map(block => {
                    if (block.trim().length > 0 && !block.startsWith('<ul>') && !block.startsWith('<p>')) {
                        return `<p>${block.trim()}</p>`;
                    }
                    return block.trim();
                }).join('');
            }
            // Remove any leftover <br> tags not part of a deliberate line break within a paragraph
            processed = processed.replace(/<br>(?!(<br>|<ul>|<\/ul>))/g, '<br>');

            return processed;
        }

        // Load data async dari file JSON
        async function loadJsonFiles() {
            try {
                const resChat = await fetch('uvochat.json');
                if (!resChat.ok) {
                    console.error(`Error fetching uvochat.json: HTTP status ${resChat.status}`);
                    throw new Error(`Gagal memuat uvochat.json. Status: ${resChat.status}`);
                }
                uvochatData = await resChat.json();
                console.log('uvochat.json loaded successfully:', uvochatData);

                try {
                    const resGames = await fetch('games.json');
                    if (!resGames.ok) {
                        console.warn(`Warning: games.json not found or could not be loaded (Status: ${resGames.status}). Game price lookup will be unavailable.`);
                        gamesData = null;
                    } else {
                        gamesData = await resGames.json();
                        console.log('games.json loaded successfully:', gamesData);
                    }
                } catch (error) {
                    console.warn('Warning: games.json not found or could not be loaded:', error);
                    gamesData = null;
                }
                
                enableInput();
                startNewChat(); // Mulai chat baru saat aplikasi dimuat
            } catch (e) {
                appendBubble("Maaf, saya gagal memuat data bantuan. Silakan coba refresh halaman. (Error: " + e.message + ")", 'ai');
                console.error("Kesalahan saat memuat file JSON:", e);
            }
        }

        function enableInput() {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }

        function disableInput() {
            userInput.disabled = true;
            sendBtn.disabled = true;
        }

        function appendBubble(text, sender) {
            const div = document.createElement('div');
            div.className = 'bubble ' + sender;
            div.innerHTML = processText(text);
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;

            // Simpan ke riwayat chat aktif
            if (currentChatIndex !== -1) {
                chatHistory[currentChatIndex].messages.push({ text: text, sender: sender });
                saveChatHistory();
            }
        }

        function appendTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'bubble ai typing';
            typingDiv.id = 'typing';
            typingDiv.innerHTML = 'UVO sedang mengetik... <span class="dot-flashing"></span>';
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
        }

        function removeTyping() {
            const typingDiv = document.getElementById('typing');
            if (typingDiv) typingDiv.remove();
        }

        // Fungsi untuk memproses input user dan menemukan jawaban
        function getAiResponse(inputText) {
            const lowerText = inputText.toLowerCase();

            // Prioritas 1: Cari di FAQ (uvochatData.faq)
            if (uvochatData && Array.isArray(uvochatData.faq)) {
                for (const entry of uvochatData.faq) {
                    if (Array.isArray(entry.keywords)) {
                        const matched = entry.keywords.some(keyword => lowerText.includes(keyword.toLowerCase()));
                        if (matched) {
                            return entry.answer;
                        }
                    }
                }
            }

            // Prioritas 2: Cari jawaban harga game (gamesData) - Jika gamesData tersedia
            if (gamesData && Array.isArray(gamesData)) {
                for (const game of gamesData) {
                    const gameKeywords = [game.name.toLowerCase()].concat(
                        Array.isArray(game.keywords) ? game.keywords.map(k => k.toLowerCase()) : []
                    );
                    
                    const foundGame = gameKeywords.some(keyword => lowerText.includes(keyword));

                    if (foundGame) {
                        let foundPrices = [];
                        for (const priceObj of game.prices) {
                            const amountKeywords = [
                                priceObj.amount.toString(),
                                (priceObj.amount / 1000) + 'k',
                                numToWords(priceObj.amount)
                            ].filter(Boolean).map(s => s.toLowerCase());

                            if (amountKeywords.some(keyword => lowerText.includes(keyword)) || lowerText.includes(`harga ${priceObj.amount}`)) {
                                foundPrices.push(priceObj);
                            }
                        }

                        if (foundPrices.length > 0) {
                            let response = `Tentu, untuk ${game.name} ${foundPrices[0].amount} ${game.unit || 'diamond'} harganya: \n`;
                            for (const p of foundPrices) {
                                response += `[[${p.amount} ${game.unit || 'diamond'} = Rp${p.price.toLocaleString('id-ID')}]]\n`;
                            }
                            response += `\nApakah ada nominal lain yang ingin Anda ketahui?`;
                            return response.trim();
                        } else {
                            let topPrices = game.prices.slice(0, 5).map(p => `- ${p.amount} ${game.unit || 'diamond'} seharga Rp${p.price.toLocaleString('id-ID')}`).join('\n');
                            let response = `Untuk **${game.name}**, kami punya pilihan top-up:\n${topPrices}\n\nUntuk info lebih detail, tanyakan dengan menyebut nominalnya (misal: "harga 100 diamond ${game.name}").`;
                            return response;
                        }
                    }
                }
            }

            // Fallback jika tidak ada jawaban spesifik
            return `Maaf, saya belum punya jawaban untuk pertanyaan itu. Coba tanyakan dengan kata kunci yang berbeda atau silakan hubungi admin kami di WhatsApp untuk bantuan lebih lanjut.`;
        }

        // Fungsi konversi angka ke kata (sederhana)
        function numToWords(num) {
            if (num === 0) return 'nol';
            const units = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan'];
            const teens = ['sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas', 'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas'];
            const tens = ['', '', 'dua puluh', 'tiga puluh', 'empat puluh', 'lima puluh', 'enam puluh', 'tujuh puluh', 'delapan puluh', 'sembilan puluh'];

            if (num < 10) return units[num];
            if (num >= 10 && num < 20) return teens[num - 10];
            if (num >= 20 && num < 100) return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? ' ' + units[num % 10] : '');
            if (num >= 100 && num < 1000) {
                let res = (num === 100 ? 'seratus' : units[Math.floor(num / 100)] + ' ratus');
                if (num % 100 !== 0) res += ' ' + numToWords(num % 100);
                return res;
            }
            if (num >= 1000 && num < 1000000) {
                let res = (num === 1000 ? 'seribu' : numToWords(Math.floor(num / 1000)) + ' ribu');
                if (num % 1000 !== 0) res += ' ' + numToWords(num % 1000);
                return res;
            }
            if (num >= 1000000 && num < 1000000000) {
                let res = (num === 1000000 ? 'satu juta' : numToWords(Math.floor(num / 1000000)) + ' juta');
                if (num % 1000000 !== 0) res += ' ' + numToWords(num % 1000000);
                return res;
            }
            return '';
        }

        async function handleUserInput() {
            const text = userInput.value.trim();
            if (text === '' || aiTyping) return;

            appendBubble(text, 'user');
            userInput.value = '';
            disableInput();
            aiTyping = true;
            appendTyping();

            // Simulate AI thinking time
            await new Promise(resolve => setTimeout(resolve, 1000 + Math.random() * 1000));

            removeTyping();
            const aiResponse = getAiResponse(text);
            appendBubble(aiResponse, 'ai');
            enableInput();
            aiTyping = false;
        }

        // Fungsi untuk menyimpan riwayat chat ke Local Storage
        function saveChatHistory() {
            localStorage.setItem('uvochatHistory', JSON.stringify(chatHistory));
            renderHistoryList();
            updateBackButtonVisibility();
        }

        // Fungsi untuk memuat riwayat chat dari Local Storage
        function loadChatHistory() {
            const storedHistory = localStorage.getItem('uvochatHistory');
            if (storedHistory) {
                chatHistory = JSON.parse(storedHistory);
            }
            renderHistoryList();
            updateBackButtonVisibility();
        }

        // Fungsi untuk menampilkan riwayat chat di sidebar
        function renderHistoryList() {
            // Hapus item riwayat yang ada, kecuali header dan tombol "Mulai Chat Baru"
            let existingHistoryItems = historyList.querySelectorAll('li:not(#new-chat-btn):not(#history-header)');
            existingHistoryItems.forEach(item => item.remove());

            if (chatHistory.length === 0) {
                historyHeader.style.display = 'none'; // Sembunyikan header jika tidak ada riwayat
                return;
            } else {
                historyHeader.style.display = 'block';
            }

            // Tambahkan item riwayat baru
            chatHistory.forEach((chatEntry, index) => {
                const li = document.createElement('li');
                li.textContent = chatEntry.title || `Chat #${index + 1}`;
                li.dataset.index = index;
                if (index === currentChatIndex) {
                    li.classList.add('active');
                }
                li.addEventListener('click', () => loadChat(index));
                historyList.appendChild(li);
            });
        }

        // Fungsi untuk memuat chat dari riwayat
        function loadChat(index) {
            closeNav();
            if (currentChatIndex === index) return; // Jika chat yang sama, jangan lakukan apa-apa

            currentChatIndex = index;
            chat.innerHTML = ''; // Kosongkan chat saat ini

            chatHistory[index].messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'bubble ' + msg.sender;
                div.innerHTML = processText(msg.text);
                chat.appendChild(div);
            });
            chat.scrollTop = chat.scrollHeight;
            updateHistoryListActiveState();
            updateBackButtonVisibility();
        }

        // Fungsi untuk memulai chat baru
        function startNewChat() {
            closeNav();
            if (chatHistory.length > 0 && chatHistory[currentChatIndex] && chatHistory[currentChatIndex].messages.length > 1) {
                // Jika chat saat ini tidak kosong, simpan dulu
                // Judul chat baru akan diambil dari pesan pertama pengguna
                const firstUserMessage = chatHistory[currentChatIndex].messages.find(msg => msg.sender === 'user');
                chatHistory[currentChatIndex].title = firstUserMessage ? firstUserMessage.text.substring(0, 20) + '...' : `Chat ${new Date().toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: '2-digit' })} ${new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' })}`;
            }

            currentChatIndex = chatHistory.length; // Set indeks ke yang baru
            chatHistory.push({ title: '', messages: [] }); // Tambahkan chat baru kosong
            
            chat.innerHTML = ''; // Bersihkan tampilan chat
            appendBubble("Halo! 👋 Saya UVOchat, asisten AI Anda. Tanyakan apa saja terkait top-up game dan layanan kami.", 'ai');
            saveChatHistory(); // Simpan riwayat yang diperbarui
            updateHistoryListActiveState();
            updateBackButtonVisibility();
        }

        // Memperbarui status aktif di daftar riwayat
        function updateHistoryListActiveState() {
            document.querySelectorAll('#sidebar-menu-items li').forEach(item => {
                item.classList.remove('active');
            });
            const activeItem = document.querySelector(`#sidebar-menu-items li[data-index="${currentChatIndex}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
            }
        }

        // Mengatur visibilitas tombol "Kembali"
        function updateBackButtonVisibility() {
            if (chatHistory.length > 1) {
                backButton.style.display = 'block';
            } else {
                backButton.style.display = 'none';
            }
        }

        sendBtn.addEventListener('click', handleUserInput);
        userInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleUserInput();
            }
        });
        newChatButton.addEventListener('click', startNewChat);

        // Event listener untuk tombol kembali yang diperbarui
        backButton.addEventListener('click', (e) => {
            e.preventDefault(); // Mencegah default behavior history.back()
            if (chatHistory.length > 1 && currentChatIndex > 0) {
                loadChat(currentChatIndex - 1); // Memuat chat sebelumnya
            } else if (chatHistory.length > 1 && currentChatIndex === 0) {
                // Jika di chat pertama, kembali ke chat terakhir (siklus)
                loadChat(chatHistory.length - 1);
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadJsonFiles();
            loadChatHistory(); // Muat riwayat saat DOM selesai
            if (chatHistory.length > 0) {
                loadChat(chatHistory.length - 1); // Muat chat terakhir jika ada
            } else {
                startNewChat(); // Jika belum ada riwayat, mulai chat baru
            }
        });
    </script>
</body>
