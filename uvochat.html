<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>UVOChat - Bantuan AI</title>
  <style>
    /* Reset & dasar */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      height: 100%; /* Pastikan html dan body mengisi seluruh tinggi viewport */
      overflow: hidden; /* Mencegah scrolling berlebih pada body */
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #121212;
      color: white;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1f1f1f;
      padding: 1rem 3rem;
      text-align: center;
      font-size: 1.6rem;
      color: #0ff;
      font-weight: 700;
      position: relative;
      user-select: none;
      flex-shrink: 0; /* Pastikan header tidak menyusut */
    }
    #back {
      position: absolute;
      top: 10px;
      left: 15px;
      background: transparent;
      color: #0ff;
      border: 2px solid #0ff;
      padding: 6px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 1rem;
      transition: background-color 0.3s, color 0.3s;
      z-index: 10;
    }
    #back:hover {
      background-color: #0ff;
      color: #121212;
    }
    #chat {
      flex: 1; /* Memastikan chat area mengisi ruang yang tersisa */
      overflow-y: auto;
      padding: 1rem 1.5rem; /* Padding yang lebih sesuai untuk mobile */
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      scroll-behavior: smooth;
      background: linear-gradient(45deg, #0f0f0f, #1a1a1a);
      -webkit-overflow-scrolling: touch; /* Memperbaiki scrolling di iOS */
    }
    .bubble {
      max-width: 85%; /* Memungkinkan bubble lebih lebar di mobile */
      padding: 0.8rem 1rem; /* Padding lebih kecil untuk mobile */
      border-radius: 20px;
      position: relative;
      animation: fadeInUp 0.4s ease forwards;
      box-shadow: 0 2px 10px rgba(0, 255, 255, 0.2);
      line-height: 1.3;
      font-size: 0.95rem; /* Ukuran font disesuaikan untuk mobile */
      word-wrap: break-word;
      user-select: text;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .user {
      background: #333;
      color: #eee;
      align-self: flex-end;
      margin-left: auto;
      border-bottom-right-radius: 2px;
      box-shadow: 0 0 8px #00fff0aa;
    }
    .ai {
      background: #00fff055;
      color: #000;
      align-self: flex-start;
      margin-right: auto;
      border-bottom-left-radius: 2px;
      box-shadow: 0 0 15px #00fff099;
    }
    .typing {
      font-style: italic;
      color: #aaa;
      background: transparent !important;
      box-shadow: none !important;
      text-align: left;
      padding-left: 0;
      font-size: 0.9rem;
    }
    #input-area {
      display: flex;
      padding: 0.7rem 1rem;
      background: #1f1f1f;
      border-top: 1px solid #333;
      gap: 0.6rem;
      flex-shrink: 0; /* Pastikan input area tidak menyusut */
    }
    input[type="text"] {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 10px;
      border: none;
      font-size: 1rem;
      background: #2a2a2a;
      color: white;
      outline-offset: 2px;
      outline-color: #00ffffbb;
      transition: outline-color 0.3s;
      min-width: 0; /* Penting untuk flex item agar tidak overflow */
    }
    input[type="text"]:focus:not(:disabled) {
      outline-color: #0ff;
      background: #3a3a3a;
    }
    input[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }
    button {
      background: #0ff;
      border: none;
      border-radius: 10px;
      padding: 0 1.3rem;
      color: black;
      font-weight: 700;
      cursor: pointer;
      transition: background-color 0.3s;
      user-select: none;
      flex-shrink: 0; /* Pastikan tombol tidak menyusut */
    }
    button:hover:not(:disabled) {
      background: #00dddd;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    /* Scrollbar keren */
    #chat::-webkit-scrollbar {
      width: 8px;
    }
    #chat::-webkit-scrollbar-track {
      background: #1f1f1f;
    }
    #chat::-webkit-scrollbar-thumb {
      background: #0ff;
      border-radius: 10px;
    }

    /* Media Queries untuk desktop/tablet */
    @media (min-width: 768px) {
      body {
        max-width: 600px; /* Batasi lebar chat di desktop agar tidak terlalu lebar */
        margin: 0 auto; /* Tengah-tengah di desktop */
        border-left: 1px solid #333;
        border-right: 1px solid #333;
      }
      header {
        padding: 1rem 1.5rem; /* Padding header disesuaikan */
      }
      #chat {
        padding: 1.5rem;
      }
      .bubble {
        max-width: 75%;
        padding: 1rem 1.2rem;
        font-size: 1rem;
      }
      .typing {
        font-size: 0.95rem;
      }
      #input-area {
        padding: 0.8rem 1.5rem;
      }
      input[type="text"] {
        padding: 0.9rem 1.2rem;
      }
      button {
        padding: 0 1.5rem;
      }
    }
  </style>
</head>
<body>
  <header>
    <button id="back" onclick="history.back()">⬅ Kembali</button>
    UVOChat - Bantuan AI
  </header>
  <div id="chat"></div>
  <div id="input-area">
    <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." disabled autocomplete="off" />
    <button id="sendBtn" disabled>Kirim</button>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    let aiTyping = false;

    let uvochatData = null;
    let gamesData = null; // games.json masih null jika tidak disediakan, tidak masalah.

    // Load data async dari file JSON
    async function loadJsonFiles() {
      try {
        // Fetch uvochat.json
        const resChat = await fetch('uvochat.json'); // Pastikan file ini ada di root yang sama
        if (!resChat.ok) {
          // Log error jika fetch tidak berhasil
          console.error(`Error fetching uvochat.json: HTTP status ${resChat.status}`);
          throw new Error(`Gagal memuat uvochat.json. Status: ${resChat.status}`);
        }
        uvochatData = await resChat.json();
        console.log('uvochat.json loaded successfully:', uvochatData); // Debugging: pastikan data termuat

        // Fetch games.json (jika ada dan diperlukan)
        // Jika kamu tidak punya games.json, kamu bisa hapus bagian ini
        try {
            const resGames = await fetch('games.json'); 
            if (!resGames.ok) {
                console.warn(`Warning: games.json not found or could not be loaded (Status: ${resGames.status}). Game price lookup will be unavailable.`);
                gamesData = null; // Set ke null jika tidak ada
            } else {
                gamesData = await resGames.json();
                console.log('games.json loaded successfully:', gamesData);
            }
        } catch (error) {
            console.warn('Warning: games.json not found or could not be loaded:', error);
            gamesData = null; // Pastikan gamesData null jika terjadi error
        }
        
        enableInput();
        appendBubble("Halo! Saya UVOChat, asisten AI Anda. Tanyakan apa saja terkait top-up game dan layanan kami.", 'ai');
      } catch (e) {
        appendBubble("Gagal memuat data bantuan. Silakan coba refresh halaman. (Error: " + e.message + ")", 'ai');
        console.error("Kesalahan saat memuat file JSON:", e);
      }
    }

    function enableInput() {
      userInput.disabled = false;
      sendBtn.disabled = false;
      userInput.focus();
    }

    function disableInput() {
      userInput.disabled = true;
      sendBtn.disabled = true;
    }

    function appendBubble(text, sender) {
      const div = document.createElement('div');
      div.className = 'bubble ' + sender;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight; // Auto-scroll ke bawah
    }

    function appendTyping() {
      const typingDiv = document.createElement('div');
      typingDiv.className = 'bubble ai typing';
      typingDiv.id = 'typing';
      typingDiv.textContent = 'UVO sedang mengetik...';
      chat.appendChild(typingDiv);
      chat.scrollTop = chat.scrollHeight;
    }

    function removeTyping() {
      const typingDiv = document.getElementById('typing');
      if (typingDiv) typingDiv.remove();
    }

    // Fungsi untuk memproses input user dan menemukan jawaban
    function getAiResponse(inputText) {
      let response = null;
      const lowerText = inputText.toLowerCase();
      console.log('User input (lowercase):', lowerText); // Debugging: lihat input yang diproses

      // Prioritas 1: Cari di FAQ (uvochatData.faq)
      // Struktur uvochat.json kamu hanya memiliki "faq", jadi kita fokus ke sini.
      if (uvochatData && Array.isArray(uvochatData.faq)) {
        for (const entry of uvochatData.faq) {
          if (Array.isArray(entry.keywords)) { // Pastikan keywords adalah array
            // Cek apakah ada keyword dari input pengguna yang cocok dengan keyword FAQ
            const matched = entry.keywords.some(keyword => lowerText.includes(keyword.toLowerCase()));
            if (matched) {
              console.log('Uvochat FAQ keyword matched:', entry.keywords); // Debugging: keyword uvochat ditemukan
              return entry.answer; // Langsung kembalikan jawaban yang cocok
            }
          }
        }
      }

      // Prioritas 2: Cari jawaban harga game (gamesData) - Jika gamesData tersedia
      // Ini akan dieksekusi jika tidak ada jawaban dari uvochat.json
      if (gamesData && Array.isArray(gamesData)) {
        for (const game of gamesData) {
          const gameKeywords = [game.name.toLowerCase()].concat(
            Array.isArray(game.keywords) ? game.keywords.map(k => k.toLowerCase()) : []
          );
          
          const foundGame = gameKeywords.some(keyword => lowerText.includes(keyword));

          if (foundGame) {
            console.log('Game matched:', game.name);
            let foundPrices = [];
            for (const priceObj of game.prices) {
              const amountKeywords = [
                priceObj.amount.toString(),
                (priceObj.amount / 1000) + 'k',
                numToWords(priceObj.amount)
              ].filter(Boolean).map(s => s.toLowerCase());

              if (amountKeywords.some(keyword => lowerText.includes(keyword))) {
                foundPrices.push(priceObj);
              }
            }

            if (foundPrices.length > 0) {
              response = `Harga top-up *${game.name}*:\n`;
              for (const p of foundPrices) {
                response += `- ${p.amount} ${game.unit || 'diamond'} = Rp${p.price.toLocaleString('id-ID')}\n`;
              }
              return response.trim();
            } else {
              let topPrices = game.prices.slice(0, 5).map(p => `- ${p.amount} ${game.unit || 'diamond'} seharga Rp${p.price.toLocaleString('id-ID')}`).join('\n');
              response = `Untuk *${game.name}*, kami punya pilihan top-up:\n${topPrices}\n\nUntuk info lebih detail, tanyakan dengan menyebut nominalnya (misal: "harga 100 diamond ${game.name}").`;
              return response;
            }
          }
        }
      }

      // Fallback jika tidak ada jawaban spesifik dari uvochat.json atau games.json
      return `Maaf, saya belum punya jawaban untuk pertanyaan itu. Coba tanyakan dengan kata kunci yang berbeda atau silakan hubungi admin kami di WhatsApp untuk bantuan lebih lanjut.`;
    }

    // Fungsi konversi angka ke kata (sederhana) - Sama seperti sebelumnya
    function numToWords(num) {
        if (num === 0) return 'nol';
        const units = ['', 'satu', 'dua', 'tiga', 'empat', 'lima', 'enam', 'tujuh', 'delapan', 'sembilan'];
        const teens = ['sepuluh', 'sebelas', 'dua belas', 'tiga belas', 'empat belas', 'lima belas', 'enam belas', 'tujuh belas', 'delapan belas', 'sembilan belas'];
        const tens = ['', '', 'dua puluh', 'tiga puluh', 'empat puluh', 'lima puluh', 'enam puluh', 'tujuh puluh', 'delapan puluh', 'sembilan puluh'];

        if (num < 10) return units[num];
        if (num >= 10 && num < 20) return teens[num - 10];
        if (num >= 20 && num < 100) return tens[Math.floor(num / 10)] + (num % 10 !== 0 ? ' ' + units[num % 10] : '');
        if (num >= 100 && num < 1000) {
            let res = (num === 100 ? 'seratus' : units[Math.floor(num / 100)] + ' ratus');
            if (num % 100 !== 0) res += ' ' + numToWords(num % 100);
            return res;
        }
        if (num >= 1000 && num < 1000000) {
            let res = (num === 1000 ? 'seribu' : numToWords(Math.floor(num / 1000)) + ' ribu');
            if (num % 1000 !== 0) res += ' ' + numToWords(num % 1000);
            return res;
        }
        if (num >= 1000000 && num < 1000000000) {
            let res = (num === 1000000 ? 'satu juta' : numToWords(Math.floor(num / 1000000)) + ' juta');
            if (num % 1000000 !== 0) res += ' ' + numToWords(num % 1000000);
            return res;
        }
        return '';
    }

    sendBtn.addEventListener('click', handleUserInput);
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        handleUserInput();
      }
    });

    document.addEventListener('DOMContentLoaded', loadJsonFiles);
  </script>
</body>
</html>
