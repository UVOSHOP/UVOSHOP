<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top-Up Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1 id="game-title">Loading...</h1>
  </header>

  <section id="topup-container">
    <h2>Pilih Nominal</h2>
    <form id="topup-form">
      <div id="nominals-container">
        <!-- Harga nominal akan ditampilkan di sini -->
      </div>

      <div id="server-id-container">
        <label for="server-id">Server ID (jika ada):</label>
        <input type="text" id="server-id" name="server-id">
      </div>

      <label for="user-id">User ID:</label>
      <input type="text" id="user-id" name="user-id" required>

      <button type="submit">Top-Up</button>
    </form>
  </section>

  <footer>
    <p>UVOSHOP - Game Top-Up</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
