<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling untuk pilihan diamond dan pembayaran */
    .diamond-card, .payment-method {
      border: 2px solid #ddd;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .diamond-card.selected, .payment-method.selected {
      border-color: #ff9900;
      background-color: #fffae6;
    }

    .diamond-card:hover, .payment-method:hover {
      background-color: #f7f7f7;
    }

    .diamond-grid, .payment-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    .diamond-card, .payment-method {
      flex: 1;
      margin: 10px;
      min-width: 120px;
    }

    .btn-beli {
      background-color: #ff9900;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }

    .btn-beli:hover {
      background-color: #e68900;
    }

    .game-select {
      margin-bottom: 20px;
    }

    .form-section {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <header>
    <div class="navbar">
      <h1 class="logo">UVO<span>SHOP</span></h1>
    </div>
  </header>

  <main>
    <!-- STEP 1: PILIH GAME -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">1</div>
        <h3>PILIH GAME</h3>
      </div>
      <div class="game-select">
        <select id="gameSelect" onchange="onGameSelect()">
          <option value="">Pilih Game</option>
          <option value="free-fire">Free Fire</option>
          <option value="mobile-legends-bang-bang">Mobile Legends</option>
          <!-- Tambahkan game lain -->
        </select>
      </div>
    </section>

    <!-- STEP 2: ISI ID -->
    <section class="step-section form-section">
      <div class="step">
        <div class="step-number">2</div>
        <h3>ISI ID</h3>
      </div>
      <input type="text" id="idInput" placeholder="Masukkan ID Anda" required />
    </section>

    <!-- STEP 3: PILIH DIAMOND -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">3</div>
        <h3>PILIH DIAMOND</h3>
      </div>
      <div id="diamondGrid" class="diamond-grid">
        <!-- Diamond list otomatis muncul -->
      </div>
    </section>

    <!-- STEP 4: PILIH METODE PEMBAYARAN -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">4</div>
        <h3>PILIH METODE PEMBAYARAN</h3>
      </div>
      <div class="payment-grid" id="paymentGrid">
        <div class="payment-method" onclick="selectPayment(this)">
          <p>Voucher UVOSHOP</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>QRIS</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>BANK</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>CASH</p>
        </div>
      </div>
    </section>

    <button class="btn-beli" onclick="sendToWhatsApp()">Beli Sekarang</button>

  </main>

  <footer></footer>

  <script>
    let gamesData = [];
    let selectedGame = null;
    let selectedDiamondData = null;

    // Pilih Game
    function onGameSelect() {
      const selectedGameId = document.getElementById('gameSelect').value;
      selectedGame = gamesData.find(game => game.id === selectedGameId);
      if (selectedGame) {
        loadDiamonds(selectedGame);
      }
    }

    // Load Diamond
    function loadDiamonds(game) {
      const diamondGrid = document.getElementById('diamondGrid');
      diamondGrid.innerHTML = '';

      if (game) {
        game.prices.forEach(price => {
          const diamondCard = document.createElement('div');
          diamondCard.classList.add('diamond-card');
          diamondCard.setAttribute('onclick', 'selectDiamond(this)');
          diamondCard.dataset.amount = price.amount;
          diamondCard.dataset.price = price.price;
          diamondCard.innerHTML = `<p>${price.amount} Diamonds</p><p>Rp ${price.price}</p>`;
          diamondGrid.appendChild(diamondCard);
        });
      }
    }

    // Pilih Diamond
    function selectDiamond(element) {
      const diamonds = document.querySelectorAll('.diamond-card');
      diamonds.forEach(diamond => diamond.classList.remove('selected'));
      element.classList.add('selected');

      selectedDiamondData = {
        amount: element.dataset.amount,
        price: element.dataset.price
      };
    }

    // Pilih Pembayaran
    function selectPayment(element) {
      const payments = document.querySelectorAll('.payment-method');
      payments.forEach(payment => payment.classList.remove('selected'));
      element.classList.add('selected');
    }

    // Kirim ke WhatsApp
    function sendToWhatsApp() {
      const id = document.getElementById('idInput').value.trim();
      const selectedPayment = document.querySelector('.payment-method.selected');
      
      if (!selectedGame || !id || !selectedDiamondData || !selectedPayment) {
        alert("Harap lengkapi semua data sebelum membeli.");
        return;
      }

      const message = `*Formulir Top Up*\n\n` +
                      `Game: ${selectedGame.name}\n` +
                      `ID: ${id}\n` +
                      `Item: ${selectedDiamondData.amount} Diamonds\n` +
                      `Harga: Rp ${selectedDiamondData.price}\n` +
                      `Metode Pembayaran: ${selectedPayment.innerText}`;

      window.location.href = `https://wa.me/6285648211278?text=${encodeURIComponent(message)}`;
    }

    // Load data dari games.json
    fetch('games.json')
      .then(response => response.json())
      .then(data => {
        gamesData = data;
      })
      .catch(error => console.error('Error loading games.json:', error));

  </script>

</body>
</html>
