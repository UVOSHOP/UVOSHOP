<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling untuk pilihan diamond */
    .diamond-card, .payment-method {
      border: 2px solid #ddd;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .diamond-card.selected, .payment-method.selected {
      border-color: #ff9900;
      background-color: #fffae6;
    }

    .diamond-card:hover, .payment-method:hover {
      background-color: #f7f7f7;
    }

    .diamond-grid, .payment-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    .diamond-card, .payment-method {
      flex: 1;
      margin: 10px;
      min-width: 120px;
      text-align: center;
    }

    .btn-beli {
      background-color: #ff9900;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }

    .btn-beli:hover {
      background-color: #e68900;
    }

    .game-select {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <header>
    <div class="navbar">
      <h1 class="logo">UVO<span>SHOP</span></h1>
      <div class="lang">
        <button>ID</button>
        <button><img src="indonesia.png" alt="ID" width="20"></button>
      </div>
    </div>
  </header>

  <main>
    <!-- STEP 1: PILIH GAME -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">1</div>
        <h3>PILIH GAME</h3>
      </div>
      <div class="game-select">
        <select id="gameSelect" onchange="onGameSelect()">
          <option value="">Pilih Game</option>
          <option value="mobile-legends-bang-bang">Mobile Legends: Bang Bang</option>
          <option value="free-fire">Free Fire</option>
          <option value="call-of-duty-mobile">Call of Duty Mobile</option>
          <option value="pokémon-unite">Pokémon Unite</option>
          <!-- Tambah game lain jika ada -->
        </select>
      </div>
    </section>

    <!-- STEP 2: PILIH DIAMOND -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">2</div>
        <h3>PILIH DIAMOND</h3>
      </div>
      <div id="diamondGrid" class="diamond-grid">
        <!-- Diamond options will be loaded automatically based on the selected game -->
      </div>
    </section>

    <!-- STEP 3: PILIH SALURAN PEMBAYARAN -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">3</div>
        <h3>PILIH SALURAN PEMBAYARAN</h3>
      </div>
      <div class="payment-grid" id="paymentGrid">
        <div class="payment-method" onclick="selectPayment(this)">
          <p>Voucher UVOSHOP</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>QRIS</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>BANK</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>CASH</p>
        </div>
      </div>
    </section>

    <!-- Tombol Beli -->
    <button class="btn-beli" onclick="sendToWhatsApp()">Beli Sekarang</button>
  </main>

  <footer>
    <!-- Footer dibiarkan kosong sesuai permintaan -->
  </footer>

  <script>
    let gamesData = [];
    let selectedGame = null;

    // Fungsi untuk memilih game
    function onGameSelect() {
      const selectedGameId = document.getElementById('gameSelect').value;
      selectedGame = gamesData.find(game => game.id === selectedGameId);
      if (selectedGame) {
        loadDiamonds(selectedGame);
      }
    }

    // Fungsi untuk memilih diamond
    function selectDiamond(element) {
      const diamonds = document.querySelectorAll('.diamond-card');
      diamonds.forEach(diamond => diamond.classList.remove('selected'));
      element.classList.add('selected');
    }

    // Fungsi untuk memilih metode pembayaran
    function selectPayment(element) {
      const payments = document.querySelectorAll('.payment-method');
      payments.forEach(payment => payment.classList.remove('selected'));
      element.classList.add('selected');
    }

    // Fungsi untuk mengirim data ke WhatsApp
    function sendToWhatsApp() {
      const id = document.getElementById('idInput').value;
      const game = selectedGame.name;
      const selectedDiamond = document.querySelector('.diamond-card.selected');
      const diamondAmount = selectedDiamond ? selectedDiamond.querySelector('p').textContent : '';
      const selectedPayment = document.querySelector('.payment-method.selected') ? document.querySelector('.payment-method.selected').textContent : '';

      const message = `ID: ${id}\nGame: ${game}\nDiamond: ${diamondAmount}\nPembayaran: ${selectedPayment}`;

      window.location.href = `https://wa.me/6285648211278?text=${encodeURIComponent(message)}`;
    }

    // Fungsi untuk memuat data game dari JSON
    fetch('games.json')
      .then(response => response.json())
      .then(data => {
        gamesData = data;
        // Set game default jika diperlukan
      })
      .catch(error => console.error('Error fetching game data:', error));

    // Fungsi untuk memuat harga diamond berdasarkan game yang dipilih
    function loadDiamonds(game) {
      const diamondGrid = document.getElementById('diamondGrid');
      diamondGrid.innerHTML = ''; // Clear previous diamonds

      if (game) {
        game.prices.forEach(price => {
          const diamondCard = document.createElement('div');
          diamondCard.classList.add('diamond-card');
          diamondCard.setAttribute('onclick', 'selectDiamond(this)');
          diamondCard.innerHTML = `<p>${price.amount} Diamonds - Rp ${price.price}</p>`;
          diamondGrid.appendChild(diamondCard);
        });
      }
    }
  </script>

</body>
</html>
