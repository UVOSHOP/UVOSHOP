<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up Free Fire</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styling untuk pilihan diamond */
    .diamond-card, .payment-method {
      border: 2px solid #ddd;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
    }

    .diamond-card.selected, .payment-method.selected {
      border-color: #ff9900;
      background-color: #fffae6;
    }

    .diamond-card:hover, .payment-method:hover {
      background-color: #f7f7f7;
    }

    .diamond-grid, .payment-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      gap: 20px;
    }

    .diamond-card, .payment-method {
      flex: 1;
      margin: 10px;
      min-width: 120px;
      text-align: center;
    }

    .btn-beli {
      background-color: #ff9900;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      margin-top: 20px;
      width: 100%;
    }

    .btn-beli:hover {
      background-color: #e68900;
    }
  </style>
</head>
<body>

  <header>
    <div class="navbar">
      <h1 class="logo">UVO<span>SHOP</span></h1>
      <div class="lang">
        <button>ID</button>
        <button><img src="indonesia.png" alt="ID" width="20"></button>
      </div>
    </div>
  </header>

  <main>
    <!-- STEP 1: MASUKKAN ID -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">1</div>
        <h3>MASUKKAN ID</h3>
      </div>
      <p>Untuk menemukan ID Pemain Anda, klik gambar avatar Anda di pojok kiri atas layar. ID Pemain Anda akan ditampilkan di bawah nama pengguna Anda.</p>
      <input type="text" placeholder="Masukkan ID Pemain Anda" class="input-id">
      <button class="btn-learn">LEARN MORE</button>
    </section>

    <!-- STEP 2: PILIH JUMLAH DIAMOND -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">2</div>
        <h3>PILIH JUMLAH DIAMOND</h3>
      </div>
      <div class="diamond-grid" id="diamondGrid">
        <!-- Daftar Diamond Akan Diisi Dengan JavaScript -->
      </div>
    </section>

    <!-- STEP 3: PILIH SALURAN PEMBAYARAN -->
    <section class="step-section">
      <div class="step">
        <div class="step-number">3</div>
        <h3>PILIH SALURAN PEMBAYARAN</h3>
      </div>
      <div class="payment-grid" id="paymentGrid">
        <div class="payment-method" onclick="selectPayment(this)">
          <p>Voucher UVOSHOP</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>QRIS</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>BANK</p>
        </div>
        <div class="payment-method" onclick="selectPayment(this)">
          <p>CASH</p>
        </div>
      </div>
    </section>

    <!-- Tombol Beli -->
    <button class="btn-beli" onclick="window.location.href='https://wa.me/6285648211278'">Beli Sekarang</button>
  </main>

  <footer>
    <!-- Footer dibiarkan kosong sesuai permintaan -->
  </footer>

  <script>
    // Fungsi untuk memilih diamond
    function selectDiamond(element) {
      const diamonds = document.querySelectorAll('.diamond-card');
      diamonds.forEach(diamond => diamond.classList.remove('selected'));
      element.classList.add('selected');
    }

    // Fungsi untuk memilih metode pembayaran
    function selectPayment(element) {
      const payments = document.querySelectorAll('.payment-method');
      payments.forEach(payment => payment.classList.remove('selected'));
      element.classList.add('selected');
    }

    // Mengambil data game dari JSON (games.json) dan menampilkan pilihan diamond
    fetch('games.json')
      .then(response => response.json())
      .then(data => {
        const game = data.find(g => g.id === 'mobile-legends-bang-bang'); // Ambil game yang sesuai (ganti jika perlu)
        const diamondGrid = document.getElementById('diamondGrid');
        game.prices.forEach(price => {
          const diamondCard = document.createElement('div');
          diamondCard.classList.add('diamond-card');
          diamondCard.setAttribute('onclick', 'selectDiamond(this)');
          diamondCard.innerHTML = `<p>${price.amount} Diamonds - Rp ${price.price}</p>`;
          diamondGrid.appendChild(diamondCard);
        });
      })
      .catch(error => console.error('Error fetching game data:', error));
  </script>

</body>
</html>
