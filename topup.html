<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-up Game</title>
    <style>
        body {
            background-color: #202938;
            color: #F9F9F9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0D1B2A;
            padding: 20px;
            text-align: center;
            color: #F9F9F9;
        }
        header h1 {
            font-size: 2em;
        }
        .container {
            padding: 20px;
        }
        input, select, button {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: orange;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: darkorange;
        }
        #price-list p {
            color: #2C3E50; /* biru gelap */
            background-color: #F9F9F9;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        footer {
            background-color: #0D1B2A;
            color: #F9F9F9;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Top-up Game</h1>
    </header>
    <div class="container">
        <h3>1<br>Masukkan ID Pemain</h3>
        <input type="text" placeholder="Masukkan ID Pemain" />

        <h3>2<br>Pilih Server (Jika Ada)</h3>
        <input type="text" placeholder="Masukkan Server (jika ada)" />

        <h3>3<br>Pilih Nominal Diamond</h3>
        <div id="price-list">
            <!-- Harga akan dimuat dari JSON melalui JS -->
        </div>

        <h3>4<br>Pilih Metode Pembayaran</h3>
        <select>
            <option>Voucher UVOSHOP</option>
            <option>QRIS</option>
            <option>BANK</option>
            <option>CASH</option>
        </select>

        <button>Beli Sekarang</button>
    </div>
    <footer>
        <p>&copy; 2025 Top-up Game | All Rights Reserved</p>
    </footer>

    <script src="loadPrices.js"></script>
</body>
</html>
