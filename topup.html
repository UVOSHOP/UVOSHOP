<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-up Game</title>
    <style>
        body {
            background-color: #202938;
            color: #F9F9F9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0D1B2A;
            padding: 20px;
            text-align: center;
            color: #F9F9F9;
        }
        header h1 {
            font-size: 2em;
        }
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .game-item {
            background-color: #1E3A8A;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            color: #F9F9F9;
        }
        .game-item h2 {
            font-size: 1.5em;
        }
        .game-item .price {
            font-size: 1.2em;
            color: #3E92CC;
        }
        .game-item button {
            background-color: #2C3E50;
            border: none;
            color: white;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 5px;
            cursor: pointer;
        }
        .game-item button:hover {
            background-color: #3E92CC;
        }
        footer {
            background-color: #0D1B2A;
            color: #F9F9F9;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>
    <header>
        <h1>Top-up Game</h1>
    </header>
    <div class="game-list">
        <div class="game-item">
            <h2>Genshin Impact</h2>
            <p class="price">Rp 1.467.568</p>
            <button>Top-up</button>
        </div>
        <div class="game-item">
            <h2>Chamet</h2>
            <p class="price">Rp 18.198</p>
            <button>Top-up</button>
        </div>
        <div class="game-item">
            <h2>Popo Live</h2>
            <p class="price">Rp 12.613</p>
            <button>Top-up</button>
        </div>
        <div class="game-item">
            <h2>Zenless Zone Zero</h2>
            <p class="price">Rp 14.414</p>
            <button>Top-up</button>
        </div>
    </div>
    <footer>
        <p>&copy; 2025 Top-up Game | All Rights Reserved</p>
    </footer>
</body>
</html>
