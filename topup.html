<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Top Up Game - UVOSHOP</title>
  <style>
    /* Reset & Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    header {
      background-color: #007bff;
      padding: 15px;
      text-align: center;
    }

    .logo {
      font-size: 24px;
      color: white;
      font-weight: bold;
    }

    main {
      padding: 15px;
      max-width: 600px;
      margin: auto;
    }

    .step-section {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .step {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .step-number {
      background-color: #ff9900;
      color: white;
      font-weight: bold;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 10px;
    }

    h3 {
      font-size: 16px;
    }

    select,
    input[type="text"] {
      width: 100%;
      padding: 12px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .diamond-grid,
    .payment-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .diamond-card,
    .payment-method {
      background: white;
      border: 2px solid #ddd;
      border-radius: 10px;
      flex: 1 1 calc(50% - 10px);
      padding: 15px 10px;
      text-align: center;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .diamond-card.selected,
    .payment-method.selected {
      border-color: #ff9900;
      background-color: #fff0dc;
    }

    .diamond-card:hover,
    .payment-method:hover {
      background-color: #f9f9f9;
    }

    .btn-beli {
      width: 100%;
      background-color: #ff9900;
      color: white;
      padding: 15px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .btn-beli:hover {
      background-color: #e08800;
    }

    @media (min-width: 480px) {
      .diamond-card,
      .payment-method {
        flex: 1 1 calc(33.33% - 10px);
      }
    }

    @media (min-width: 768px) {
      .diamond-card,
      .payment-method {
        flex: 1 1 calc(25% - 10px);
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">UVO<span style="color:#ffcc00;">SHOP</span></div>
</header>

<main>
  <!-- STEP 1 -->
  <section class="step-section">
    <div class="step">
      <div class="step-number">1</div>
      <h3>Pilih Game</h3>
    </div>
    <select id="gameSelect" onchange="onGameSelect()">
      <option value="">-- Pilih Game --</option>
      <option value="free-fire">Free Fire</option>
      <option value="mobile-legends-bang-bang">Mobile Legends</option>
      <option value="call-of-duty-mobile">Call of Duty Mobile</option>
      <option value="pokémon-unite">Pokémon Unite</option>
    </select>
  </section>

  <!-- STEP 2 -->
  <section class="step-section">
    <div class="step">
      <div class="step-number">2</div>
      <h3>Isi ID</h3>
    </div>
    <input type="text" id="idInput" placeholder="Masukkan ID Game Anda" required>
  </section>

  <!-- STEP 3 -->
  <section class="step-section">
    <div class="step">
      <div class="step-number">3</div>
      <h3>Pilih Diamond</h3>
    </div>
    <div id="diamondGrid" class="diamond-grid">
      <!-- Diisi otomatis -->
    </div>
  </section>

  <!-- STEP 4 -->
  <section class="step-section">
    <div class="step">
      <div class="step-number">4</div>
      <h3>Metode Pembayaran</h3>
    </div>
    <div id="paymentGrid" class="payment-grid">
      <div class="payment-method" onclick="selectPayment(this)">Voucher UVOSHOP</div>
      <div class="payment-method" onclick="selectPayment(this)">QRIS</div>
      <div class="payment-method" onclick="selectPayment(this)">BANK</div>
      <div class="payment-method" onclick="selectPayment(this)">CASH</div>
    </div>
  </section>

  <button class="btn-beli" onclick="sendToWhatsApp()">Beli Sekarang</button>
</main>

<script>
  let gamesData = [], selectedGame = null, selectedDiamondData = null;

  document.addEventListener('DOMContentLoaded', function() {
    fetch('games.json')
      .then(response => response.json())
      .then(data => gamesData = data)
      .catch(err => console.error('Gagal memuat games.json:', err));
  });

  function onGameSelect() {
    const selectedGameId = document.getElementById('gameSelect').value;
    selectedGame = gamesData.find(game => game.id === selectedGameId);
    selectedDiamondData = null;
    document.getElementById('diamondGrid').innerHTML = '';
    if (selectedGame && selectedGame.prices) {
      selectedGame.prices.forEach(price => {
        const card = document.createElement('div');
        card.className = 'diamond-card';
        card.onclick = () => selectDiamond(card);
        card.dataset.amount = price.amount;
        card.dataset.price = price.price;
        card.innerHTML = `<p>${price.amount} Diamonds</p><p>Rp ${price.price}</p>`;
        document.getElementById('diamondGrid').appendChild(card);
      });
    }
  }

  function selectDiamond(el) {
    document.querySelectorAll('.diamond-card').forEach(card => card.classList.remove('selected'));
    el.classList.add('selected');
    selectedDiamondData = {
      amount: el.dataset.amount,
      price: el.dataset.price
    };
  }

  function selectPayment(el) {
    document.querySelectorAll('.payment-method').forEach(card => card.classList.remove('selected'));
    el.classList.add('selected');
  }

  function sendToWhatsApp() {
    const id = document.getElementById('idInput').value.trim();
    const selectedPayment = document.querySelector('.payment-method.selected');
    if (!selectedGame || !id || !selectedDiamondData || !selectedPayment) {
      alert("Lengkapi semua data terlebih dahulu!");
      return;
    }

    const message = `*Formulir Top Up*\n\n` +
      `Game: ${selectedGame.name}\n` +
      `ID: ${id}\n` +
      `Item: ${selectedDiamondData.amount} Diamonds\n` +
      `Harga: Rp ${selectedDiamondData.price}\n` +
      `Pembayaran: ${selectedPayment.innerText}`;

    window.location.href = `https://wa.me/6285648211278?text=${encodeURIComponent(message)}`;
  }
</script>

</body>
</html>
