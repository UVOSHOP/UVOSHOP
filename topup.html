<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-up Game</title>
    <style>
        body {
            background-color: #202938;
            color: #F9F9F9;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0D1B2A;
            padding: 20px;
            text-align: center;
            color: #F9F9F9;
        }
        header h1 {
            font-size: 2em;
        }
        .container {
            padding: 20px;
        }
        input, select, button {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            padding: 10px;
            font-size: 1em;
            border-radius: 5px;
            border: none;
        }
        button {
            background-color: orange;
            color: white;
            cursor: pointer;
        }
        button:hover {
            background-color: darkorange;
        }
        #price-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .price-item {
            background-color: #F9F9F9;
            color: #2C3E50;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            flex: 1 1 calc(50% - 10px); /* 2 kolom */
            text-align: center;
        }
        .price-item.selected {
            background-color: #3E92CC;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <header>
        <h1>Top-up Game</h1>
    </header>
    <div class="container">
        <h3>1<br>Masukkan ID Pemain</h3>
        <input type="text" id="player-id" placeholder="Masukkan ID Pemain" />

        <h3>2<br>Pilih Server (Jika Ada)</h3>
        <input type="text" id="server-id" placeholder="Masukkan Server (jika ada)" />

        <h3>3<br>Pilih Nominal Diamond</h3>
        <div id="price-list">
            <!-- Harga akan dimuat dari JSON -->
        </div>

        <h3>4<br>Pilih Metode Pembayaran</h3>
        <select id="payment-method">
            <option>Voucher UVOSHOP</option>
            <option>QRIS</option>
            <option>BANK</option>
            <option>CASH</option>
        </select>

        <button id="buy-button">Beli Sekarang</button>
    </div>

    <script src="loadPrices.js"></script>
</body>
</html>
