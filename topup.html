<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Top Up - UVOSHOP</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header>
        <h1 id="game-title"></h1>
    </header>
    <main>
        <form id="topup-form">
            <label>
                User ID:
                <input type="text" id="user-id" required />
            </label>
            <div id="server-id-container">
                <label>
                    Server ID:
                    <input type="text" id="server-id" />
                </label>
            </div>
            <div id="nominals-container"></div>
            <button type="submit">Beli</button>
        </form>
    </main>
    <script src="script.js"></script>
</body>
</html>
