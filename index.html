<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOSHOP - Top-Up Game & E-Wallet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <div class="container">
            <h1>UVOSHOP</h1>
            <input type="text" placeholder="Cari game atau e-wallet..." id="search" />
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <h2>Top-Up Saldo Game dan E-Wallet dengan Mudah dan Cepat</h2>

            <div class="categories">
                <!-- Top Up Game Section -->
                <div class="category">
                    <h3>Top-Up Game</h3>
                    <div class="products">
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/74/PlayerUnknown%27s_Battlegrounds_Logo.png" alt="PUBG">
                            <p>PUBG</p>
                        </div>
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e1/Mobile_Legends_Logo.png" alt="Mobile Legends">
                            <p>Mobile Legends</p>
                        </div>
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Free_Fire_Logo.png" alt="Free Fire">
                            <p>Free Fire</p>
                        </div>
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/9/94/Call_of_Duty_logo.png" alt="Call of Duty">
                            <p>Call of Duty</p>
                        </div>
                    </div>
                </div>

                <!-- Top Up E-Wallet Section -->
                <div class="category">
                    <h3>Top-Up E-Wallet</h3>
                    <div class="products">
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/OVO_Logo_2020.png" alt="OVO">
                            <p>OVO</p>
                        </div>
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/GoPay_logo_2020.png" alt="GoPay">
                            <p>GoPay</p>
                        </div>
                        <div class="product">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/DANA_logo_2018.png" alt="DANA">
                            <p>DANA</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2025 UVOSHOP - Semua Hak Dilindungi.</p>
    </footer>

</body>
</html>
