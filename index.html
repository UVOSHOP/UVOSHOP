    </div>

    <!-- Formulir -->
    <div class="form-container">
        <h2>Formulir Top Up</h2>
        <form action="#" method="POST">
            <div>
                <label for="game">Pilih Game:</label>
                <select id="game" name="game">
                    <option value="mlbb">Mobile Legends: Bang Bang</option>
                    <option value="free-fire">Garena Free Fire</option>
                    <option value="pubg-mobile">PUBG Mobile</option>
                    <option value="genshin-impact">Genshin Impact</option>
                    <!-- Tambahkan game lain sesuai kebutuhan -->
                </select>
            </div>

            <div>
                <label for="nominal">Pilih Nominal:</label>
                <div class="nominal-option">
                    <input type="radio" id="nominal-1" name="nominal" value="100" checked>
                    <label for="nominal-1">100 Diamond</label>
                </div>
                <div class="nominal-option">
                    <input type="radio" id="nominal-2" name="nominal" value="200">
                    <label for="nominal-2">200 Diamond</label>
                </div>
                <div class="nominal-option">
                    <input type="radio" id="nominal-3" name="nominal" value="500">
                    <label for="nominal-3">500 Diamond</label>
                </div>
                <!-- Tambahkan nominal lainnya sesuai kebutuhan -->
            </div>

            <div>
                <label for="payment-method">Pilih Metode Pembayaran:</label>
                <select id="payment-method" name="payment-method">
                    <option value="qris">QRIS</option>
                    <option value="ewallet">E-Wallet</option>
                    <option value="bank">Bank Transfer</option>
                    <option value="cash">Cash</option>
                </select>
            </div>

            <button type="submit" class="submit-btn">Lanjutkan Pembayaran</button>
        </form>

        <p class="help-text">Jika Anda membutuhkan bantuan, silakan hubungi customer support.</p>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2025 UVOSHOP - Semua Hak Dilindungi</p>
        </div>
    </footer>

</body>
</html>
