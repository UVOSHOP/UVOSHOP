<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>UVOSHOP - Top Up Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #f5f5f5;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      padding: 10px;
    }

    .logo img {
      height: 40px;
    }

    .search-group {
      display: flex;
      align-items: center;
      flex: 1;
      margin-left: 10px;
    }

    .search-bar input {
      width: 100%;
      padding: 6px 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .indonesia-logo img {
      height: 40px;
      margin-left: 10px;
    }

    .banner-slider {
      width: 100%;
      overflow-x: auto;
      white-space: nowrap;
    }

    .banner-slider img {
      width: 100%;
      height: auto;
      display: block;
    }

    .category-section {
      padding: 20px;
    }

    .category-section h2 {
      margin-bottom: 10px;
    }

    .games-row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding-bottom: 10px;
    }

    .games-row::-webkit-scrollbar {
      display: none;
    }

    .game-card {
      min-width: calc(100% / 2.2);
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .game-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    footer {
      background: #111;
      color: #fff;
      padding: 20px;
    }

    footer a {
      color: #ffa500;
      text-decoration: none;
    }

    footer ul {
      padding-left: 16px;
    }

    @media (min-width: 768px) {
      .game-card {
        min-width: 180px;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-container">
      <div class="logo">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHWaznqhfZR-HN6HrI265L3pUCG34dU-MfyqZRXKePXrAFWuqX7b9l-bohrI4320oF0FBWw1nS-DCNSr97_k0ZGVa_Pp5m3ABMaTIVsO3XhXwq_8ITFOAPnvCyLxtCnjYrkk73vTWh7VGRG4XOWommgHULggrW8T9ckbaLpTtVlr58LM1653wkfBZTfpiU/s320/WhatsApp%20Image%202025-04-28%20at%2009.28.50_d2f7bd41.jpg" alt="UVOSHOP Logo">
      </div>
      <div class="search-group">
        <div class="search-bar">
          <input type="text" id="search-input" placeholder="Cari Game...">
        </div>
        <div class="indonesia-logo">
          <img src="https://cdn.unipin.com/images/navigation/gamecenter-overlay-web.png" alt="Logo Indonesia">
        </div>
      </div>
    </div>

    <div class="banner-slider" id="banner-slider">
      <!-- Banner images... (sama seperti sebelumnya) -->
    </div>
  </header>

  <main>
    <section class="category-section">
      <h2>Game Populer</h2>
      <div class="games-row" id="popular-games">
        <!-- Game akan dimuat dari JS -->
      </div>
    </section>

    <section class="category-section">
      <h2>Game Mobile</h2>
      <div class="games-row" id="mobile-games"></div>
    </section>

    <section class="category-section">
      <h2>Game PC</h2>
      <div class="games-row" id="pc-games"></div>
    </section>

    <section class="category-section">
      <h2>Voucher Game</h2>
      <div class="games-row" id="game-vouchers"></div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <h2>BERLANGGANAN</h2>
      <p>Dapatkan Penawaran Terbaik Sekarang!</p>
      <p>UVOShop adalah tempat terbaik untuk melakukan top-up game di Indonesia...</p>
      <ul>
        <li>Flash Top-Up</li>
        <li>Voucher</li>
        <li>Game Lainnya</li>
        <li>FAQ</li>
      </ul>
      <p>Hubungi kami: <a href="tel:+6285648211278">+62 856-4821-1278</a></p>
      <p>© 2025 UVOShop. Semua Hak Cipta</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
