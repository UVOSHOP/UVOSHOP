<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOShop Top-Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.pinimg.com/736x/92/27/e1/9227e1907f5d5af2314701ec2d386837.jpg" alt="UVOShop Logo">
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Cari Game atau Aplikasi...">
        </div>
    </header>

    <nav class="categories">
        <button class="category-btn active" data-category="all">Semua</button>
        <button class="category-btn" data-category="mobile">Game Mobile</button>
        <button class="category-btn" data-category="pc">Game PC</button>
        <button class="category-btn" data-category="app">Aplikasi</button>
        <button class="category-btn" data-category="voucher">Voucher</button>
    </nav>

    <main>
        <section class="game-list" id="gameList">
            <!-- Kartu game akan ditambahkan oleh script.js -->
        </section>
    </main>

    <footer>
        <p>Hubungi kami melalui WhatsApp: <a href="https://wa.me/6285648211278">+62 856-4821-1278</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
