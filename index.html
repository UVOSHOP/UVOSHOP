<!DOCTYPE html>
<html lang="id" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UVOShop - TopUp Game & Voucher</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Dark Mode Support -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: '#007bff',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-white text-gray-900 dark:bg-gray-900 dark:text-white transition-all duration-300">

  <!-- Header -->
  <header class="p-4 flex justify-between items-center bg-primary text-white dark:bg-gray-800">
    <img src="https://i.pinimg.com/736x/92/27/e1/9227e1907f5d5af2314701ec2d386837.jpg" alt="UVOShop Logo" class="h-12">
    <h1 class="text-xl font-bold">🎮 UVOShop</h1>
    <button id="theme-toggle" class="text-sm bg-white text-primary px-3 py-1 rounded dark:bg-gray-700 dark:text-white">
      🌙/🌞
    </button>
  </header>

  <!-- Search Bar -->
  <div class="p-4">
    <input id="search" type="text" class="w-full p-2 rounded bg-gray-100 dark:bg-gray-700 dark:text-white" placeholder="Cari game..." />
  </div>

  <!-- Main Content -->
  <main class="p-6">
    <!-- Kategori -->
    <div class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">Game Populer</h2>
      <div class="overflow-x-auto flex space-x-4 pb-4 scroll-smooth" id="game-populer"></div>
    </div>
    
    <div class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">Game Mobile</h2>
      <div class="overflow-x-auto flex space-x-4 pb-4 scroll-smooth" id="game-mobile"></div>
    </div>
    
    <div class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">Game PC</h2>
      <div class="overflow-x-auto flex space-x-4 pb-4 scroll-smooth" id="game-pc"></div>
    </div>
    
    <div class="mb-8">
      <h2 class="text-2xl font-semibold mb-4">Voucher</h2>
      <div class="overflow-x-auto flex space-x-4 pb-4 scroll-smooth" id="voucher"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
