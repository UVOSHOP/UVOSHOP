<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UVOSHOP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>UVOSHOP</h1>
    <p>Top Up Game & Voucher Termurah</p>
  </header>

  <!-- Banner Slider -->
  <div class="banner-container">
    <div class="banner-slider" id="banner-slider">
      <img src="assets/banner1.jpg" alt="Banner 1" />
      <img src="assets/banner2.jpg" alt="Banner 2" />
      <img src="assets/banner3.jpg" alt="Banner 3" />
    </div>
  </div>

  <!-- Tempat kategori dan game akan di-load oleh JS -->
  <div id="categories-container"></div>

  <footer>
    <p>&copy; 2025 UVOSHOP</p>
  </footer>

  <script src="js.js"></script>
  <script>
    // Auto Slide Banner
    const slider = document.getElementById('banner-slider');
    let index = 0;
    setInterval(() => {
      index = (index + 1) % slider.children.length;
      slider.style.transform = `translateX(-${index * 100}%)`;
    }, 3000);
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    .banner-container {
      overflow: hidden;
      width: 100%;
      max-height: 180px;
      position: relative;
    }
    .banner-slider {
      display: flex;
      transition: transform 0.5s ease-in-out;
      width: 300%;
    }
    .banner-slider img {
      width: 100%;
      object-fit: cover;
    }
    #categories-container {
      padding: 20px;
    }
    .category {
      margin-bottom: 30px;
    }
    .category h2 {
      margin-bottom: 10px;
      color: #333;
    }
    .games-row {
      display: flex;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .game-item {
      flex: 0 0 auto;
      margin-right: 15px;
      text-align: center;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 5px rgba(0,0,0,0.1);
      width: 100px;
    }
    .game-item img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    footer {
      background: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
    }
  </style>
</body>
</html>
