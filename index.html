<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UVOSHOP - Top Up Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: sans-serif;
    }

    header {
      background-color: #222;
      padding: 10px 20px;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo img {
      max-height: 50px;
    }

    .search-bar input {
      padding: 8px;
      width: 200px;
      border-radius: 20px;
      border: none;
    }

    .indonesia-logo img {
      max-height: 30px;
    }

    /* Banner */
    .auto-banner {
      margin: 10px 0;
      overflow: hidden;
    }

    .auto-banner-container {
      width: 100%;
      height: 200px;
      overflow: hidden;
      position: relative;
    }

    .auto-banner-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 10px;
      transition: opacity 0.5s ease-in-out;
    }

    /* Kategori Game */
    .category-section {
      padding: 20px;
    }

    h2 {
      margin-top: 20px;
    }

    .games-row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px 0;
    }

    .games-row::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="logo.png" alt="UVOSHOP">
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cari game...">
      </div>
      <div class="indonesia-logo">
        <img src="indonesia.png" alt="ID">
      </div>
    </div>
  </header>

  <!-- Banner Otomatis -->
  <section class="auto-banner">
    <div class="auto-banner-container">
      <img id="rotating-banner" src="" alt="Banner">
    </div>
  </section>

  <!-- Game Categories -->
  <section class="category-section">
    <h2>Popular</h2>
    <div id="popular-games" class="games-row scrollable"></div>

    <h2>Mobile</h2>
    <div id="mobile-games" class="games-row scrollable"></div>

    <h2>PC</h2>
    <div id="pc-games" class="games-row scrollable"></div>

    <h2>Voucher</h2>
    <div id="game-vouchers" class="games-row scrollable"></div>
  </section>

  <!-- Banner JS -->
  <script>
    const bannerImages = [
      "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgBZBH7Aeqf85qpQI_rhWvvUkz324Q5WHWkie_JcD8LqjQ10EkgWQvC8ZNbSSnJOU2mNDMI8gixXi87xuKiiGCwZergxvAhpPs6e4-f_gjDyxkvZNcXU-yRoO2VNkVqay5M4Dj1CAJyEEyFtVIWEvu0V4YvSr0X5GoBy4C1oCJX0QkgZzytx1QD_MsKlhxg/s320/3.png",
      "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgYP1EjdxlKtTIWdJSrzHlnVDs_ZJK8yuMffc4ckUqIaB-cvjhAX-tqo3eLzzxpSJnCl71VYDhVmG59Xk5eZG24zIuJ-hQ4iihV33Z0NOq1o183twDuCOftZymWowx2HHY7AmR2hD0LilOHHNuCzP5-x4PhIPMfyWic23opUJfjTIe9kIEu2HV9p3tGUxD5/s320/5.png",
      "https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEhzPV5zHzK0E40bLmIWKcCm4p6ctP3agfACbNlPMWTo3uBmLe9EkujmuswMKwBE9mNVdm1sUBCFaQDqOIQZcLtaYu7z4KioiKq7kCp12M-rMVEGYtZD6XYK4ris8aHq7xYdu_kalWcIMCr-l3YnCOxuty1vrJhQ4uMSlMphzd-4PUlXC_bneqFTk6A_CPAL/s320/4.png"
    ];

    let currentBanner = 0;
    const bannerElement = document.getElementById("rotating-banner");

    function showNextBanner() {
      bannerElement.style.opacity = 0;
      setTimeout(() => {
        bannerElement.src = bannerImages[currentBanner];
        bannerElement.style.opacity = 1;
        currentBanner = (currentBanner + 1) % bannerImages.length;
      }, 300);
    }

    bannerElement.src = bannerImages[0];
    setInterval(showNextBanner, 3000);
  </script>

</body>
</html>
