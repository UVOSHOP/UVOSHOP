<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVO SHOP - Game Top-Up</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* Styles for Animation and Layout */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    /* Banner Style */
    #banner-slider {
      width: 100%;
      height: 250px;
      overflow: hidden;
      position: relative;
    }
    #banner-slider img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      animation: slide 9s infinite;
    }
    @keyframes slide {
      0% { transform: translateX(0); }
      33% { transform: translateX(-100%); }
      66% { transform: translateX(-200%); }
      100% { transform: translateX(0); }
    }

    /* Category Section */
    .category-container {
      display: flex;
      justify-content: space-between;
      padding: 20px;
      overflow-x: auto;
      margin-bottom: 20px;
    }
    .category-container div {
      flex: 1;
      min-width: 200px;
      margin-right: 15px;
    }
    .category-container div:last-child {
      margin-right: 0;
    }

    .game-card {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      text-align: center;
      margin-bottom: 20px;
      padding: 15px;
      transition: transform 0.3s;
    }

    .game-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }

    .game-card h3 {
      margin-top: 10px;
      font-size: 18px;
    }

    .game-card:hover {
      transform: scale(1.05);
    }

    /* Top-Up Button */
    .game-card .topup-btn {
      display: block;
      margin-top: 15px;
      padding: 10px 20px;
      background-color: #00bcd4;
      color: white;
      border: none;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      text-align: center;
    }
    .game-card .topup-btn:hover {
      background-color: #0097a7;
    }

    /* Search Bar */
    #search-input {
      margin: 20px;
      padding: 10px;
      width: 95%;
      font-size: 16px;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .category-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>

  <!-- Banner Geser -->
  <div id="banner-slider">
    <img src="banner1.jpg" alt="Banner 1">
    <img src="banner2.jpg" alt="Banner 2">
    <img src="banner3.jpg" alt="Banner 3">
  </div>

  <!-- Search Bar -->
  <input type="text" id="search-input" placeholder="Cari game...">

  <!-- Categories -->
  <div class="category-container">
    <div id="popular-games">
      <h3>Popular Games</h3>
    </div>
    <div id="mobile-games">
      <h3>Mobile Games</h3>
    </div>
    <div id="pc-games">
      <h3>PC Games</h3>
    </div>
    <div id="game-vouchers">
      <h3>Game Vouchers</h3>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const gameId = params.get('game');
  
      if (!gameId) {
        // === INDEX.HTML: Daftar game, kategori & search ===
        const searchInput = document.getElementById('search-input');
        const categories = {
          'popular-games': document.getElementById('popular-games'),
          'mobile-games': document.getElementById('mobile-games'),
          'pc-games': document.getElementById('pc-games'),
          'game-vouchers': document.getElementById('game-vouchers'),
        };
  
        // buat elemen card game
        function createGameCard(game) {
          const card = document.createElement('div');
          card.className = 'game-card';
          card.innerHTML = `
            <img src="${game.icon}" alt="${game.name}" />
            <h3>${game.name}</h3>
            <a href="topup.html?game=${game.id}" class="topup-btn">Top Up</a>
          `;
          return card;
        }
  
        // load games.json
        fetch('games.json')
          .then(res => res.json())
          .then(games => {
            games.forEach(game => {
              const card = createGameCard(game);
              // distribusi ke kategori
              switch (game.category) {
                case 'popular':
                  categories['popular-games'].appendChild(card);
                  break;
                case 'mobile':
                  categories['mobile-games'].appendChild(card);
                  break;
                case 'pc':
                  categories['pc-games'].appendChild(card);
                  break;
                case 'voucher':
                  categories['game-vouchers'].appendChild(card);
                  break;
                default:
                  categories['popular-games'].appendChild(card);
              }
            });
          })
          .catch(err => console.error('Gagal load games.json:', err));
  
        // search filter
        searchInput.addEventListener('input', () => {
          const term = searchInput.value.toLowerCase();
          Object.values(categories).forEach(container => {
            Array.from(container.children).forEach(card => {
              const name = card.querySelector('h3').innerText.toLowerCase();
              card.style.display = name.includes(term) ? 'block' : 'none';
            });
          });
        });
  
      }
    });
  </script>
</body>
</html>
