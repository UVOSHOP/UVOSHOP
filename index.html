<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOShop Top-Up</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.pinimg.com/736x/92/27/e1/9227e1907f5d5af2314701ec2d386837.jpg" alt="UVOShop Logo">
        </div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Cari Game...">
            <button>Search</button>
        </div>
        <div class="id">ID</div>
    </header>

    <main>
        <section class="categories">
            <div class="category" onclick="filterCategory('Mobile')">Mobile</div>
            <div class="category" onclick="filterCategory('PC')">PC</div>
            <div class="category" onclick="filterCategory('Voucher')">Voucher</div>
        </section>

        <section id="game-list" class="games">
            <!-- Games will be rendered here by JavaScript -->
        </section>
    </main>

    <footer>
        <div class="contact-info">
            <p>Hubungi kami melalui WhatsApp: <a href="https://wa.me/6285648211278">+6285648211278</a></p>
        </div>
    </footer>
</body>
</html>
