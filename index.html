<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOShop - Top Up Game</title>
    <link rel="stylesheet" href="style.css">
    <!-- Swiper.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.css"/>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <img src="https://i.pinimg.com/736x/92/27/e1/9227e1907f5d5af2314701ec2d386837.jpg" alt="UVOShop Logo">
        </div>
        <div class="search-box">
            <input type="text" id="search" placeholder="Cari Game...">
        </div>
        <div class="id">
            ID
        </div>
    </header>

    <!-- Kategori -->
    <section class="categories">
        <div class="swiper kategoriSwiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide">Semua</div>
                <div class="swiper-slide">Mobile</div>
                <div class="swiper-slide">PC</div>
                <div class="swiper-slide">Voucher</div>
                <div class="swiper-slide">Lainnya</div>
            </div>
        </div>
    </section>

    <!-- Games -->
    <main>
        <div class="swiper gameSwiper">
            <div class="swiper-wrapper" id="game-list">
                <!-- Game item akan otomatis dimasukkan disini -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2025 UVOShop. Semua Hak Dilindungi.</p>
    </footer>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@9/swiper-bundle.min.js"></script>
    <!-- Script UVOShop -->
    <script src="script.js"></script>

</body>
</html>
