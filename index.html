<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UVOSHOP - Top Up Game Murah</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <img src="logo.png" alt="UVOSHOP">
  </div>
  <div class="toggle-theme">
    <button id="theme-toggle">🌞/🌙</button>
  </div>
</header>

<nav class="categories">
  <button class="category-btn" data-category="semua">Semua</button>
  <button class="category-btn" data-category="populer">Game Populer</button>
  <button class="category-btn" data-category="mobile">Game Mobile</button>
  <button class="category-btn" data-category="pc">Game PC</button>
  <button class="category-btn" data-category="voucher">Voucher Game</button>
  <button class="category-btn" data-category="apk">Aplikasi</button>
</nav>

<main>
  <div class="product-slider" id="product-slider">
    <!-- Game dan produk akan di-generate lewat JS -->
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
