<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UVOSHOP - Top Up Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      animation: fadeIn 1s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .auto-banner-container {
      width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      margin: 0 auto 20px auto;
    }

    .auto-banner-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .banner-slide {
      flex: 0 0 100%;
      max-height: 200px;
    }

    .banner-slide img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
    }

    .logo img {
      height: 50px;
    }

    .indonesia-logo {
      font-weight: bold;
      font-size: 18px;
      padding-right: 10px;
    }

    .search-bar input {
      padding: 5px;
      font-size: 16px;
    }

    .category-section {
      padding: 20px;
    }

    .games-row {
      display: flex;
      overflow-x: scroll;
      padding: 10px 0;
    }

    .game-item {
      margin-right: 15px;
      padding: 10px;
      background-color: #f0f0f0;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      width: 100px;
      flex-shrink: 0;
    }

    .game-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      margin-bottom: 5px;
      border-radius: 5px;
    }

    .game-item:hover {
      background-color: #0d1b2a;
      color: white;
    }

    #mobile-games {
      overflow-x: scroll;
      display: flex;
      gap: 15px;
    }

    #mobile-games .game-item {
      flex: 0 0 25%;
    }

    .payment-slider {
      width: 100%;
      overflow: hidden;
      background: #0f141a;
      padding: 10px 0;
    }

    .payment-track {
      display: flex;
      animation: scroll-left 20s linear infinite;
    }

    .payment-track img {
      height: 40px;
      margin: 0 20px;
    }

    @keyframes scroll-left {
      from {
        transform: translateX(100%);
      }
      to {
        transform: translateX(-100%);
      }
    }

    .footer {
      text-align: center;
      padding: 30px 20px;
      background-color: #0d1b2a;
      font-size: 14px;
      margin-top: 40px;
    }

    .footer img {
      margin-top: 20px;
      height: 60px;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHWaznqhfZR-HN6HrI265L3pUCG34dU-MfyqZRXKePXrAFWuqX7b9l-bohrI4320oF0FBWw1nS-DCNSr97_k0ZGVa_Pp5m3ABMaTIVsO3XhXwq_8ITFOAPnvCyLxtCnjYrkk73vTWh7VGRG4XOWommgHULggrW8T9ckbaLpTtVlr58LM1653wkfBZTfpiU/s320/WhatsApp%20Image%202025-04-28%20at%2009.28.50_d2f7bd41.jpg" alt="UVOSHOP">
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cari game...">
      </div>
      <div class="indonesia-logo">ID</div>
    </div>
  </header>

  <!-- Banner Geser Horizontal -->
  <section class="auto-banner">

        <div class="banner-slide"><img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgV8rdE7OE5X0cb8_W6JLqCHD7azewhXxoG5l4wySwvdIsBjsNxQ6USmbDntq0v90r-MU_Uq9H09LNFar9La_vb0R3e4oCN-3I9FXXclto9njD_o1UIzWJtzVDluVhNco_tLtbMVNrSWrNJzQu7_pO5hvt4HohdDEMtYiwWPaSCbPWUP0SZnOyEOEnd33zS/s320/2.png" alt=""></div>

      </div>
    </div>
  </section>

  <!-- Game Categories -->
  <section class="category-section">

    <h2>Mobile</h2>

      <div class="game-item"><img src="assets/mlbb.png" alt="Mobile Legends"><div>Mobile Legends</div></div>
      <div class="game-item"><img src="assets/ff.png" alt="Free Fire"><div>Free Fire</div></div>
      <div class="game-item"><img src="assets/pubgm.png" alt="PUBG Mobile"><div>PUBG Mobile</div></div>
      <div class="game-item"><img src="assets/genshin.png" alt="Genshin Impact"><div>Genshin</div></div>
    </div>
  </section>

  <!-- Payment Slider -->
  <section class="payment-slider">
    <div class="payment-track">
      <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEg_HeBHeWcNm5tNE6Y63Z7-VaeEZcxK_sVvLO_XJEr23o6hb5_F5N_0Wug72vYsEuY9boL3xQJ4g0moMi0E2wotmXIq51P3bbLxlXxo2uMHsYOcOVnMnw_iqrrczzwe8sb3Swnr79eqP4Xl62F2su4yA0ttmdQUhlPqU9b_BCEBXrx4jW9WWhlBP9NjsMFWJ4mw/s320/payment-method.png" alt="">

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <p>&copy; 2025 UVOSHOP | All Rights Reserved</p>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0c/Flag_of_Indonesia.svg/1024px-Flag_of_Indonesia.svg.png" alt="Indonesia Flag">
  </footer>

  <script>
    let currentSlide = 0;
    const totalSlides = document.querySelectorAll('.banner-slide').length;
    const bannerTrack = document.getElementById('bannerTrack');

    setInterval(slideBanner, 3000);

    function slideBanner() {
      currentSlide = (currentSlide + 1) % totalSlides;
      bannerTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
    }
  </script>
</body>
</html>
