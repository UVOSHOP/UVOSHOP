<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOSHOP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <img src="URL_LOGO" alt="Logo UVOSHOP">
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Cari game atau e-wallet..." id="search" oninput="searchGames()">
        </div>
    </header>

    <section class="game-list">
        <h2>Top-Up Game</h2>
        <div class="game" onclick="window.location.href='https://wa.me/085648211278?text=Top-up%20PUBG'">
            <img src="https://cdn.unipin.com/images/icon_product_pages/1658817763-icon-200x200_icon%20ff.jpg" alt="PUBG">
            <h3>PUBG</h3>
            <button>Top-Up</button>
        </div>
        <div class="game" onclick="window.location.href='https://wa.me/085648211278?text=Top-up%20ML'">
            <img src="https://cdn.unipin.com/images/icon_product_pages/1735814979-icon-Image_20250102184102.jpg" alt="Mobile Legends">
            <h3>Mobile Legends</h3>
            <button>Top-Up</button>
        </div>
        <div class="game" onclick="window.location.href='https://wa.me/085648211278?text=Top-up%20FF'">
            <img src="https://cdn.unipin.com/images/icon_product_pages/1578906433-icon-Game-icon-4.jpg" alt="Free Fire">
            <h3>Free Fire</h3>
            <button>Top-Up</button>
        </div>
        <!-- Add more games here -->
    </section>

    <footer>
        <p>© 2025 UVOSHOP - Semua Hak Dilindungi</p>
    </footer>

    <script>
        // Function to handle search functionality
        function searchGames() {
            var searchInput = document.getElementById("search").value.toLowerCase();
            var games = document.getElementsByClassName("game");

            for (var i = 0; i < games.length; i++) {
                var gameName = games[i].getElementsByTagName("h3")[0].innerText.toLowerCase();
                if (gameName.indexOf(searchInput) > -1) {
                    games[i].style.display = "";
                } else {
                    games[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
