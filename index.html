<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UVOSHOP - Top Up Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --clr-body: #0E1120;
      --clr-header: #202938;
      --clr-card-bg: #1a1f2b;
      --clr-text: #ffffff;
      --clr-accent: #007bff;
    }
    body {
      margin: 0; padding: 0;
      background-color: var(--clr-body);
      color: var(--clr-text);
      font-family: 'Segoe UI', sans-serif;
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    header {
      background-color: var(--clr-header);
      padding: 0.6rem 0; /* Memperkecil ukuran bar atas */
    }
    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1rem;
    }

    .btn-back {
      background: none;
      border: none;
      color: var(--clr-text);
      font-size: 1rem;
      cursor: pointer;
    }
    .logo img { width: 120px; }

    .search-bar {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-bar input {
      padding: 0.5rem 0.75rem;
      border-radius: 4px; 
      border: none;
      width: 220px;
    }
    .search-bar span {
      position: absolute;
      right: -30px;
      font-size: 1rem;
      color: var(--clr-text);
      font-weight: bold;
      top: 50%;
      transform: translateY(-50%);
    }

    .search-bar span#search-text {
      text-transform: uppercase;
    }

    /* Banner Slider */
    .banner-slider {
      display: flex;
      gap: 0.5rem;
      animation: slide 15s infinite; /* Banner geser setiap 3 detik */
      margin-bottom: 1rem;
      overflow: hidden;
    }

    @keyframes slide {
      0% { transform: translateX(0); }
      25% { transform: translateX(-100%); }
      50% { transform: translateX(-200%); }
      75% { transform: translateX(-300%); }
      100% { transform: translateX(0); }
    }

    .banner-slider img {
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 6px;
    }

    .category-section {
      max-width: 1200px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    .category-section h2 {
      font-size: 1.25rem;
      color: var(--clr-text);
      border-left: 4px solid var(--clr-accent);
      padding-left: 0.5rem;
    }

    .games-row {
      display: flex;
      overflow-x: auto;
      gap: 1rem;
      padding-bottom: 0.5rem;
    }
    .game-card {
      background: var(--clr-card-bg);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      flex: 0 0 140px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.4);
      position: relative;
    }
    .game-card img {
      width: 56px; height: 56px;
      margin-bottom: 0.5rem;
    }
    .game-card h3 {
      font-size: 0.9rem;
      font-weight: 500;
      text-transform: uppercase;
      margin: 0;
    }
    .game-card .btn-topup {
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      background-color: var(--clr-accent);
      border: none; color: #fff;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    .form-container {
      background: var(--clr-card-bg);
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
      max-width: 500px;
      margin: 2rem auto;
      color: var(--clr-text);
    }
    .form-container h2 {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--clr-text);
      margin-bottom: 1rem;
      text-align: center;
    }
    input[type="text"], input[type="number"], input[type="radio"], select {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border-radius: 6px;
      border: 2px solid var(--clr-accent);
      background-color: #222831;
      color: var(--clr-text);
      font-size: 1rem;
      transition: all 0.3s ease;
    }
    input[type="text"]:focus, input[type="number"]:focus, select:focus {
      border-color: var(--clr-accent);
      box-shadow: 0 0 8px rgba(0, 123, 255, 0.6);
    }

    label {
      font-size: 1rem;
      margin-bottom: 0.5rem;
      display: block;
      color: var(--clr-text);
    }

    .nominal-option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0;
      background-color: #1f232b;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .nominal-option input[type="radio"] {
      margin-right: 12px;
    }

    .nominal-option label {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background-color: var(--clr-accent);
      color: var(--clr-text);
      border: none;
      border-radius: 6px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .submit-btn:hover {
      background-color: #0056b3;
    }

    .help-text {
      font-size: 0.9rem;
      color: #ccc;
      text-align: center;
      margin-top: 10px;
    }

    /* Responsif untuk tampilan mobile */
    @media (max-width: 768px) {
      .search-bar {
        width: 100%;
        position: relative;
        margin-bottom: 1rem;
      }
      .search-bar input {
        width: 100%;
        margin-right: 45px;
      }
      .search-bar span {
        position: absolute;
        right: 10px;
        font-size: 1rem;
        color: var(--clr-text);
        font-weight: bold;
        top: 50%;
        transform: translateY(-50%);
      }

      .banner-slider {
        flex-direction: column;
        overflow-x: hidden;
      }
      .banner-slider img {
        object-fit: contain;
        width: 100%;
      }

      header {
        padding: 0.4rem 0; /* Memperkecil bar atas untuk mobile */
      }
    }
  </style>
</head>
