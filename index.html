<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UVOSHOP - Top Up Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    /* Style lainnya tetap sama */
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="header-container">
      <div class="logo">
        <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgHWaznqhfZR-HN6HrI265L3pUCG34dU-MfyqZRXKePXrAFWuqX7b9l-bohrI4320oF0FBWw1nS-DCNSr97_k0ZGVa_Pp5m3ABMaTIVsO3XhXwq_8ITFOAPnvCyLxtCnjYrkk73vTWh7VGRG4XOWommgHULggrW8T9ckbaLpTtVlr58LM1653wkfBZTfpiU/s320/WhatsApp%20Image%202025-04-28%20at%2009.28.50_d2f7bd41.jpg" alt="UVOSHOP">
      </div>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Cari game...">
      </div>
      <div class="indonesia-logo">ID</div>
    </div>
  </header>

  <!-- Banner Geser Horizontal -->
  <section class="auto-banner">
    <!-- Banner tetap sama -->
  </section>

  <!-- Game Categories -->
  <section class="category-section">
    <h2>Game Rekomendasi</h2>
    <div id="popular-games" class="games-row scrollable">
      <div class="game-item"><img src="assets/mlbb.png" alt="Mobile Legends"><div>Mobile Legends</div></div>
      <div class="game-item"><img src="assets/ff.png" alt="Free Fire"><div>Free Fire</div></div>
      <div class="game-item"><img src="assets/pubgm.png" alt="PUBG Mobile"><div>PUBG Mobile</div></div>
      <div class="game-item"><img src="assets/genshin.png" alt="Genshin Impact"><div>Genshin</div></div>
      <div class="game-item"><img src="assets/valo.png" alt="Valorant"><div>Valorant</div></div>
    </div>

    <!-- Mobile dan kategori lainnya tetap sama -->

  </section>

  <!-- Dekorasi Bawah -->
  <div class="payment-slider">
    <!-- Payment slider tetap sama -->
  </div>

  <div class="footer">
    <!-- Footer tetap sama -->
  </div>

  <script>
    // Fitur Banner Geser
    const bannerTrack = document.getElementById('bannerTrack');
    let currentSlide = 0;
    const totalSlides = bannerTrack.children.length;

    function slideBanner() {
      currentSlide = (currentSlide + 1) % totalSlides;
      bannerTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    setInterval(slideBanner, 3000);

    // Fitur Search Game
    const searchInput = document.getElementById('search-input');
    const gameItems = document.querySelectorAll('.game-item');

    searchInput.addEventListener('input', function() {
      const query = searchInput.value.toLowerCase();
      
      gameItems.forEach(function(item) {
        const gameName = item.querySelector('div').textContent.toLowerCase();
        if (gameName.includes(query)) {
          item.style.display = '';
        } else {
          item.style.display = 'none';
        }
      });
    });
  </script>
  <script src="script.js"></script>
</body>
</html>
