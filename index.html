<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Banner Slider</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
    }
    .banner-container {
      width: 100%;
      overflow: hidden;
      position: relative;
    }
    .banner-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
      width: 300%; /* 3 banner slide */
    }
    .banner-slide {
      min-width: 100%;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: white;
    }
    .slide1 { background: red; }
    .slide2 { background: green; }
    .slide3 { background: blue; }
  </style>
</head>
<body>
  <div class="banner-container">
    <div class="banner-track" id="bannerTrack">
      <div class="banner-slide slide1">Slide 1</div>
      <div class="banner-slide slide2">Slide 2</div>
      <div class="banner-slide slide3">Slide 3</div>
    </div>
  </div>

  <script>
    const bannerTrack = document.getElementById('bannerTrack');
    let currentSlide = 0;
    const totalSlides = 3;

    function slideBanner() {
      currentSlide = (currentSlide + 1) % totalSlides;
      bannerTrack.style.transform = `translateX(-${currentSlide * 100}%)`;
    }

    setInterval(slideBanner, 3000); // Ganti slide tiap 3 detik
  </script>
</body>
</html>
