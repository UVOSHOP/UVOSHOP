<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Up UVOSHOP</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
    }
    .container {
      width: 80%;
      margin: 50px auto;
      padding: 20px;
      background-color: #fff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      color: #333;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
      color: #333;
    }
    input, select, button {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 16px;
    }
    select {
      cursor: pointer;
    }
    button {
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #45a049;
    }
    .result {
      margin-top: 20px;
      text-align: center;
      font-size: 18px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Top Up Diamond UVOSHOP</h1>

  <form id="topup-form">
    <div class="form-group">
      <label for="user_id">ID Pengguna</label>
      <input type="text" id="user_id" placeholder="Masukkan ID Pengguna" required>
    </div>

    <div class="form-group">
      <label for="diamond_amount">Pilih Jumlah Diamond</label>
      <select id="diamond_amount" required>
        <option value="12">12 Diamonds - Rp 3500</option>
        <option value="28">28 Diamonds - Rp 8000</option>
        <option value="36">36 Diamonds - Rp 10000</option>
        <option value="56">56 Diamonds - Rp 16000</option>
        <option value="85">85 Diamonds - Rp 23000</option>
        <option value="169">169 Diamonds - Rp 46000</option>
        <option value="220">220 Diamonds - Rp 60000</option>
        <option value="282">282 Diamonds - Rp 80000</option>
        <option value="366">366 Diamonds - Rp 100000</option>
        <option value="568">568 Diamonds - Rp 150000</option>
        <option value="875">875 Diamonds - Rp 230000</option>
        <option value="2010">2010 Diamonds - Rp 500000</option>
        <option value="4804">4804 Diamonds - Rp 1200000</option>
        <option value="6004">6004 Diamonds - Rp 1500000</option>
      </select>
    </div>

    <div class="form-group">
      <label for="payment_method">Pilih Metode Pembayaran</label>
      <select id="payment_method" required>
        <option value="Code UVOSHOP">Code UVOSHOP</option>
        <option value="Qris">Qris</option>
        <option value="Bank">Bank</option>
        <option value="Cash">Cash</option>
      </select>
    </div>

    <button type="button" onclick="redirectToWhatsApp()">Beli</button>
  </form>

  <div class="result" id="result"></div>
</div>

<script>
  function redirectToWhatsApp() {
    var userId = document.getElementById('user_id').value;
    var diamondAmount = document.getElementById('diamond_amount').value;
    var paymentMethod = document.getElementById('payment_method').value;

    if (!userId || !diamondAmount || !paymentMethod) {
      alert("Semua kolom harus diisi!");
      return;
    }

    var message = `Halo, saya ingin melakukan top-up! \nGame: Mobile Legends: Bang Bang\nID Pengguna: ${userId}\nJumlah Diamond: ${diamondAmount}\nMetode Pembayaran: ${paymentMethod}`;
    var whatsappUrl = `https://wa.me/6285648211278?text=${encodeURIComponent(message)}`;

    window.open(whatsappUrl, '_blank');
  }
</script>

</body>
</html>
