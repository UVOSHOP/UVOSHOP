<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UVO SHOP - Game Top-Up</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Banner Geser -->
  <div id="banner-slider">
    <img src="banner1.jpg" alt="Banner 1">
    <img src="banner2.jpg" alt="Banner 2">
    <img src="banner3.jpg" alt="Banner 3">
  </div>

  <!-- Daftar Game -->
  <section id="game-list">
    <h2>Daftar Game</h2>
    <input type="text" id="search-input" placeholder="Cari game...">

    <div id="popular-games" class="game-category">
      <h3>Game Populer</h3>
    </div>
    <div id="mobile-games" class="game-category">
      <h3>Game Mobile</h3>
    </div>
    <div id="pc-games" class="game-category">
      <h3>Game PC</h3>
    </div>
    <div id="game-vouchers" class="game-category">
      <h3>Voucher Game</h3>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
