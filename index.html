<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UVOSHOP - Top Up Game</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      animation: fadeIn 1s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .auto-banner-container {
      width: 100%;
      overflow-x: auto;
      white-space: nowrap;
      margin: 0 auto 20px auto;
    }

    .auto-banner-track {
      display: flex;
      transition: transform 0.5s ease-in-out;
    }

    .banner-slide {
      flex: 0 0 100%;
      max-height: 200px;
    }

    .banner-slide img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
    }

    .logo img {
      height: 50px;
    }

    .indonesia-logo {
      font-weight: bold;
      font-size: 18px;
      padding-right: 10px;
    }

    .search-bar input {
      padding: 5px;
      font-size: 16px;
    }

    .category-section {
      padding: 20px;
    }

    .games-row {
      display: flex;
      overflow-x: scroll;
      padding: 10px 0;
    }

    .game-item {
      margin-right: 15px;
      padding: 10px;
      background-color: #f0f0f0 ;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      width: 100px;
      flex-shrink: 0;
    }

    .game-item img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      margin-bottom: 5px;
      border-radius: 5px;
    }

    .game-item:hover {
      background-color: #0d1b2a;
      color: white;
    }

    .payment-marquee {
      width: 100%;
      overflow: hidden;
      background-color: #fff;
      padding: 10px 0;
      border-top: 1px solid #ccc;
      border-bottom: 1px solid #ccc;
    }

    .payment-track {
      display: inline-block;
      white-space: nowrap;
      animation: marquee 25s linear infinite;
    }

    .payment-track img {
      height: 30px;
      margin: 0 20px;
      vertical-align: middle;
    }

    @keyframes marquee {
      from { transform: translateX(100%); }
      to { transform: translateX(-100%); }
    }

    .footer-container {
      background-color: #f8f8f8;
      padding: 30px 20px 10px;
      text-align: center;
      font-size: 14px;
      color: #333;
    }

    .footer-logo {
      margin-top: 20px;
    }

    .footer-logo img {
      height: 50px;
    }

    #mobile-games .game-item {
      width: calc(100% / 4 - 15px); /* Menampilkan 4 game (3 penuh 1 setengah) */
    }
  </style>
</head>
