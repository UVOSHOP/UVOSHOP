<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOShop - Top Up Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://i.pinimg.com/736x/92/27/e1/9227e1907f5d5af2314701ec2d386837.jpg" alt="UVOShop">
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Cari di UVOShop...">
        </div>
        <div class="user-id">
            <span>ID</span>
        </div>
    </header>

    <main>
        <div class="category">
            <button class="active">Game Populer</button>
            <button>Game PC</button>
            <button>Voucher Game</button>
        </div>

        <div class="game-slider">
            <!-- Add game items here dynamically using JS -->
        </div>
    </main>

    <footer>
        <div class="contact">
            <p>Hubungi kami melalui <a href="tel:+6285648211278">WhatsApp</a></p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
