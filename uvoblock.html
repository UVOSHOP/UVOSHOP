<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UVOBLOCK - Puzzle Pecah Blok</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Memastikan elemen tidak bisa di-highlight atau dipilih oleh pengguna */
            -webkit-tap-highlight-color: transparent; /* Untuk iOS Safari */
            -webkit-touch-callout: none; /* Untuk iOS Safari */
            -webkit-user-select: none; /* Untuk iOS Safari */
            -khtml-user-select: none; /* Untuk Konqueror */
            -moz-user-select: none; /* Untuk Firefox */
            -ms-user-select: none; /* Untuk Internet Explorer/Edge */
            user-select: none; /* Standar */
        }

        /* Gaya Umum untuk Mencegah Scroll di HP */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* **PENTING: Mencegah scroll di body** */
            touch-action: none; /* **PENTING: Mencegah pan/zoom default pada sentuhan** */
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #2c3e50; /* Initial dark blue-grey */
            font-family: 'Press Start 2P', cursive; /* Gaya font pixelated */
            color: #ecf0f1; /* Off-white */
            overscroll-behavior: none; /* Mencegah pull-to-refresh */
            transition: background-color 1s ease-in-out; /* Smooth background transition */
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a; /* Dark background */
            border: 5px solid #3498db; /* Bright blue border */
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.8), 0 0 10px rgba(0, 255, 255, 0.5) inset; /* Neon glow */
            padding: 25px;
            border-radius: 12px;
            position: relative;
            max-width: 95%; /* Batasi lebar agar responsif di HP */
            max-height: 98%; /* Batasi tinggi agar responsif di HP */
            overflow: hidden; /* Pastikan konten tidak keluar dari container */
            aspect-ratio: 1 / 1.3; /* Rasio aspek untuk game, agar proporsional */
        }

        /* Orientasi Landscape untuk HP */
        @media (orientation: landscape) and (max-height: 500px) {
            #game-container {
                flex-direction: row; /* Ubah tata letak menjadi baris */
                justify-content: space-around;
                aspect-ratio: unset; /* Izinkan lebar dan tinggi fleksibel */
                width: 98%;
                height: 95%;
                padding: 15px;
            }
            #header {
                flex-direction: column;
                align-items: center;
                margin-bottom: 0;
                margin-right: 15px;
                padding: 0;
            }
            #game-area {
                flex-direction: row;
                gap: 15px;
                flex-grow: unset;
                /* Tambahkan ini agar grid tidak terlalu besar di landscape */
                max-width: 50%;
                justify-content: flex-start; /* Untuk menempatkan grid di kiri */
            }
            #game-grid {
                /* Sesuaikan ukuran grid di landscape */
                width: min(calc(9 * 30px + 2 * 3px), 50vh); 
                height: min(calc(9 * 30px + 2 * 3px), 50vh);
            }
            #block-preview {
                flex-direction: column;
                padding: 10px;
                min-height: unset;
                min-width: 100px;
                height: auto;
                width: auto;
                /* Tambahkan ini agar block-preview mengisi sisa ruang di landscape */
                flex-grow: 1; 
                justify-content: flex-start; /* Untuk menempatkan blok dari atas */
                overflow-y: auto; /* Izinkan scroll vertikal jika banyak blok */
                align-items: center; /* Pusatkan blok di kolom */
            }
            .block-slot {
                width: 80px;
                height: 80px;
            }
        }


        #header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }

        #game-title {
            font-size: 2.8em;
            color: #e74c3c; /* Bright red */
            text-shadow: 0 0 12px #e74c3c, 0 0 5px #e74c3c; /* Neon red glow */
            margin: 0;
            white-space: nowrap; /* Mencegah teks memecah baris */
            font-size: clamp(1.2em, 5vw, 2.8em); /* Responsif font size */
        }

        #scoreDisplay {
            font-size: 1.8em;
            color: #f1c40f; /* Bright yellow */
            text-shadow: 0 0 8px #f1c40f;
            margin: 0;
            white-space: nowrap;
            font-size: clamp(1em, 4vw, 1.8em); /* Responsif font size */
        }

        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px; /* Jarak antara grid dan preview blok */
            flex-grow: 1; /* Agar mengambil ruang vertikal yang tersedia */
            justify-content: center; /* Pusatkan konten secara vertikal */
            width: 100%; /* Pastikan game area mengisi lebar */
        }

        /* Game Grid */
        #game-grid {
            display: grid;
            grid-template-columns: repeat(9, 1fr); /* 9x9 grid, 1fr untuk responsif */
            grid-template-rows: repeat(9, 1fr);
            border: 3px solid #555;
            background-color: #333;
            box-shadow: inset 0 0 12px rgba(0,0,0,0.6);
            border-radius: 5px;
            overflow: hidden; /* Pastikan sel tidak keluar dari batas */
            width: min(calc(9 * 40px + 2 * 3px), 95vw); /* Default desktop, max 95vw di mobile */
            height: min(calc(9 * 40px + 2 * 3px), 95vw); /* Sama dengan lebar untuk kotak */
            aspect-ratio: 1 / 1; /* Pastikan grid selalu kotak */
        }

        .grid-cell {
            border: 1px solid #444; /* Garis antar sel */
            background-color: #3d3d3d; /* Warna sel kosong */
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.1s ease-out; /* Animasi saat highlight/invalid */
            font-size: 0; /* Sembunyikan angka '1' di sel grid */
        }

        .grid-cell.occupied {
            background-color: #7f8c8d; /* Default filled block color (should be overridden by color classes) */
            position: relative; /* Untuk animasi ledakan */
            overflow: hidden; /* Penting untuk animasi partikel */
        }
        
        /* Warna untuk blok yang sudah di grid */
        .grid-cell.color-red { background-color: #e74c3c; }
        .grid-cell.color-blue { background-color: #3498db; }
        .grid-cell.color-yellow { background-color: #f1c40f; }
        .grid-cell.color-purple { background-color: #9b59b6; }
        .grid-cell.color-orange { background-color: #e67e22; }
        .grid-cell.color-green { background-color: #2ecc71; }
        .grid-cell.color-cyan { background-color: #00bcd4; } /* Warna tambahan */
        .grid-cell.color-pink { background-color: #e91e63; } /* Warna tambahan */


        /* Block Preview Area */
        #block-preview {
            display: flex;
            gap: 25px;
            padding: 20px;
            background-color: #222;
            border-radius: 10px;
            /* Min-height yang cukup agar tidak terpotong, disesuaikan dengan padding dan gap */
            min-height: calc(100px + 2 * 20px + 2 * 1px); /* Tinggi slot + padding + border */
            align-items: center;
            justify-content: center;
            width: 100%; /* Lebar penuh container */
            flex-wrap: wrap; /* Agar blok bisa pindah baris di layar kecil */
            /* Mengatur overflow-x agar pilihan blok tidak terpotong di HP */
            overflow-x: auto; 
            -webkit-overflow-scrolling: touch; /* Efek scrolling halus di iOS */
            padding-bottom: 25px; /* Tambahan padding agar tidak terpotong */
        }

        .block-slot {
            width: 100px; /* Ukuran slot */
            height: 100px;
            border: 1px dashed #666;
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            cursor: grab;
            transition: transform 0.1s ease-out;
            background-color: #2a2a2a;
            flex-shrink: 0; /* Mencegah slot mengecil terlalu banyak */
            touch-action: none; /* Mencegah sentuhan pada slot memicu scroll */
        }

        .block-slot:hover:not(.dragging):not(:empty) {
            transform: translateY(-5px); /* Efek hover */
        }

        .block-slot.dragging {
            cursor: grabbing;
            transform: scale(1.05); /* Sedikit membesar saat drag */
        }

        .block-slot:empty {
            border: none; /* Hilangkan border jika slot kosong */
            background-color: transparent;
        }

        /* Draggable Block Container (for both preview and ghost) */
        .draggable-block-container {
            display: grid;
            /* grid-template-columns diatur oleh JS sesuai bentuk blok */
            grid-auto-rows: var(--block-piece-size); /* Ukuran potongan blok, dari JS */
            pointer-events: none; /* Penting untuk drag & drop */
        }

        .block-piece {
            width: var(--block-piece-size); /* Ukuran setiap "potongan" blok */
            height: var(--block-piece-size);
            border: 1px solid rgba(0,0,0,0.2); /* Garis samar antar potongan */
            background-color: #ccc; /* Default color, akan di-override */
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255,255,255,0.7); /* Warna teks di dalam blok */
        }

        /* Warna untuk block-piece (saat di preview/diseret) */
        .block-piece.color-red { background-color: #ff6b6b; } /* Lebih terang dari di grid */
        .block-piece.color-blue { background-color: #6aabff; }
        .block-piece.color-yellow { background-color: #ffe66d; }
        .block-piece.color-purple { background-color: #be8eff; }
        .block-piece.color-orange { background-color: #ff9f43; }
        .block-piece.color-green { background-color: #6eff6e; }
        .block-piece.color-cyan { background-color: #79e3f0; }
        .block-piece.color-pink { background-color: #ff85b3; }


        /* Ghost Block (saat diseret) */
        .ghost {
            opacity: 0.8;
            position: fixed; /* Penting agar tidak terpengaruh scroll atau parent */
            z-index: 9999;
            /* Transform diatur oleh JS agar mengikuti touch/mouse */
            transition: opacity 0.1s ease-out;
            pointer-events: none; /* Biarkan event touch/mouse menembus ghost */
        }

        /* Highlight dan Invalid Cells */
        .grid-cell.highlight {
            background-color: rgba(46, 204, 113, 0.6); /* Hijau transparan */
            border: 2px solid #2ecc71;
            box-shadow: 0 0 8px rgba(46, 204, 113, 0.8);
        }

        .grid-cell.invalid {
            background-color: rgba(231, 76, 60, 0.6); /* Merah transparan */
            border: 2px solid #e74c3c;
            box-shadow: 0 0 8px rgba(231, 76, 60, 0.8);
        }

        /* Overlay Game Over */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ecf0f1;
            text-align: center;
            z-index: 100;
            border-radius: 12px;
            transition: opacity 0.3s ease-out;
        }

        #game-overlay.hidden {
            opacity: 0;
            pointer-events: none; /* Agar tidak menghalangi interaksi saat tersembunyi */
        }

        #overlay-message {
            font-size: 3em;
            color: #e74c3c;
            margin-bottom: 30px;
            text-shadow: 0 0 18px #e74c3c, 0 0 8px #e74c3c;
            font-size: clamp(2em, 8vw, 3em); /* Responsif font size */
        }

        #restartButton {
            padding: 15px 35px;
            font-size: 1.6em;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease, box-shadow 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            font-size: clamp(1.2em, 6vw, 1.6em); /* Responsif font size */
        }

        #restartButton:hover {
            background-color: #27ae60;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        #restartButton:active {
            transform: scale(0.98);
            box-shadow: 0 2px 4px rgba(0,2,4,0.2);
        }

        /* Animasi Ledakan Blok */
        .explosion-particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: explode 0.5s forwards ease-out;
            pointer-events: none;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }

        /* Responsif untuk ukuran cell dan block piece */
        @media (max-width: 500px) {
            #game-container {
                padding: 15px;
            }
            #header {
                margin-bottom: 15px;
            }
            #game-area {
                gap: 15px;
            }
            #game-grid {
                /* Ukuran grid akan disesuaikan oleh JS berdasarkan ukuran container */
                border-width: 2px;
            }
            .grid-cell {
                border-width: 0.5px;
            }
            #block-preview {
                padding: 10px;
                min-height: 90px;
                gap: 15px;
            }
            .block-slot {
                width: 80px;
                height: 80px;
                padding: 3px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1 id="game-title">UVOBLOCK</h1>
            <p id="scoreDisplay">Skor: 0</p>
        </div>
        <div id="game-area">
            <div id="game-grid">
            </div>
            <div id="block-preview">
                <div class="block-slot" id="slot1"></div>
                <div class="block-slot" id="slot2"></div>
                <div class="block-slot" id="slot3"></div>
            </div>
        </div>
        
        <div id="game-overlay" class="hidden">
            <h2 id="overlay-message">GAME OVER!</h2>
            <button id="restartButton">Mulai Lagi</button>
        </div>
    </div>

    <script src="uvoblock.js"></script>
</body>
</html>
