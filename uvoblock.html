<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVOBLOCK - Puzzle Pecah Blok</title>
    <style>
        /* Gaya CSS */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50; /* Warna latar belakang gelap */
            font-family: 'Arial', sans-serif;
            overflow: hidden; /* Mencegah scroll */
            color: #ecf0f1;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #1a1a1a;
            border: 5px solid #3498db;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.7);
            padding: 20px;
            border-radius: 10px;
            position: relative;
        }

        #header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 0 10px;
        }

        #game-title {
            font-size: 2.5em;
            color: #e74c3c;
            text-shadow: 0 0 10px #e74c3c;
            margin: 0;
        }

        #scoreDisplay {
            font-size: 1.8em;
            color: #f1c40f;
            margin: 0;
        }

        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        #game-grid {
            display: grid;
            grid-template-columns: repeat(9, 40px); /* Grid 9x9, ukuran sel 40px */
            grid-template-rows: repeat(9, 40px);
            border: 2px solid #555;
            background-color: #333;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .grid-cell {
            width: 40px;
            height: 40px;
            border: 1px solid #444;
            box-sizing: border-box; /* Pastikan padding/border tidak menambah ukuran */
            background-color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .grid-cell.occupied {
            background-color: #7f8c8d; /* Warna blok yang sudah terisi */
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
        }

        /* Warna untuk blok individu (saat diseret) */
        .block-piece {
            width: 38px; /* Sedikit lebih kecil dari sel agar ada border */
            height: 38px;
            background-color: #27ae60; /* Contoh warna hijau */
            border: 1px solid #1e8449;
            box-sizing: border-box;
            position: relative;
            z-index: 1;
        }

        /* Gaya untuk berbagai warna blok */
        .color-red { background-color: #e74c3c; border-color: #c0392b; }
        .color-blue { background-color: #3498db; border-color: #2980b9; }
        .color-yellow { background-color: #f1c40f; border-color: #f39c12; }
        .color-purple { background-color: #9b59b6; border-color: #8e44ad; }
        .color-orange { background-color: #e67e22; border-color: #d35400; }
        .color-green { background-color: #2ecc71; border-color: #27ae60; }


        #block-preview {
            display: flex;
            gap: 20px;
            padding: 15px;
            background-color: #222;
            border-radius: 8px;
            min-height: 100px; /* Agar ada ruang meskipun kosong */
            align-items: flex-end;
        }

        .block-slot {
            min-width: 80px; /* Memberi ruang untuk blok besar */
            min-height: 80px;
            border: 1px dashed #555;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px;
            box-sizing: border-box;
            cursor: grab;
        }

        .block-slot.dragging {
            cursor: grabbing;
        }

        .draggable-block-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, 20px); /* Grid internal untuk bentuk blok */
            grid-auto-rows: 20px;
            position: relative; /* Untuk penempatan relatif saat diseret */
        }

        /* Overlay Game Over */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ecf0f1;
            text-align: center;
            z-index: 100;
            border-radius: 10px;
        }

        #game-overlay.hidden {
            display: none;
        }

        #overlay-message {
            font-size: 3em;
            color: #e74c3c;
            margin-bottom: 30px;
            text-shadow: 0 0 15px #e74c3c;
        }

        #restartButton {
            padding: 15px 30px;
            font-size: 1.5em;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        #restartButton:hover {
            background-color: #27ae60;
            transform: scale(1.05);
        }

        /* Gaya untuk pratinjau blok saat diseret */
        .grid-cell.highlight {
            background-color: rgba(46, 204, 113, 0.5); /* Hijau transparan */
        }

        .grid-cell.invalid {
            background-color: rgba(231, 76, 60, 0.5); /* Merah transparan */
        }

        /* Ghost block saat diseret */
        .ghost {
            opacity: 0.7;
            position: fixed; /* Penting agar tidak terpengaruh scroll atau parent */
            z-index: 9999;
            transform: translate(-50%, -50%); /* Agar pusat ghost di bawah kursor */
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="header">
            <h1 id="game-title">UVOBLOCK</h1>
            <p id="scoreDisplay">Skor: 0</p>
        </div>
        <div id="game-area">
            <div id="game-grid">
                </div>
            <div id="block-preview">
                <div class="block-slot" id="slot1"></div>
                <div class="block-slot" id="slot2"></div>
                <div class="block-slot" id="slot3"></div>
            </div>
        </div>
        
        <div id="game-overlay" class="hidden">
            <h2 id="overlay-message">GAME OVER!</h2>
            <button id="restartButton">Mulai Lagi</button>
        </div>
    </div>

    <script>
        // Logika JavaScript
        const gameGridElement = document.getElementById('game-grid');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const blockPreviewSlots = [
            document.getElementById('slot1'),
            document.getElementById('slot2'),
            document.getElementById('slot3')
        ];
        const gameOverlay = document.getElementById('game-overlay');
        const overlayMessage = document.getElementById('overlay-message');
        const restartButton = document.getElementById('restartButton');

        const GRID_ROWS = 9;
        const GRID_COLS = 9;
        const CELL_SIZE = 40; // Ukuran setiap sel dalam piksel
        const GRID_CELLS_COUNT = GRID_ROWS * GRID_COLS;

        let gameGrid = []; // Array 2D untuk merepresentasikan grid
        let score = 0;
        let currentBlocks = []; // Blok yang tersedia untuk ditempatkan
        let draggedBlock = null; // Blok yang sedang diseret
        let draggedBlockIndex = -1; // Index blok yang sedang diseret dari currentBlocks
        let ghostElement = null; // Elemen ghost yang mengikuti kursor

        // --- Definisi Bentuk Blok ---
        // Setiap bentuk didefinisikan sebagai array 2D
        // 1 = bagian blok, 0 = kosong
        // Warna akan ditambahkan saat dibuat
        const BLOCK_SHAPES = [
            // Kotak
            { shape: [[1]], color: 'color-red' },
            { shape: [[1, 1], [1, 1]], color: 'color-blue' },
            { shape: [[1, 1, 1]], color: 'color-yellow' },
            { shape: [[1], [1], [1]], color: 'color-purple' },
            // L-Shapes
            { shape: [[1, 0], [1, 0], [1, 1]], color: 'color-orange' },
            { shape: [[0, 1], [0, 1], [1, 1]], color: 'color-green' },
            { shape: [[1, 1], [1, 0]], color: 'color-blue' },
            { shape: [[1, 1], [0, 1]], color: 'color-yellow' },
            // T-Shape
            { shape: [[0, 1, 0], [1, 1, 1]], color: 'color-purple' },
            // Z-Shape
            { shape: [[1, 1, 0], [0, 1, 1]], color: 'color-red' },
            { shape: [[0, 1, 1], [1, 1, 0]], color: 'color-green' },
            // Garis panjang
            { shape: [[1, 1, 1, 1]], color: 'color-orange' },
            { shape: [[1], [1], [1], [1]], color: 'color-red' },
            // 5x5 (baris atau kolom)
            { shape: [[1,1,1,1,1]], color: 'color-blue'},
            { shape: [[1],[1],[1],[1],[1]], color: 'color-yellow'}
        ];

        // --- Inisialisasi Game ---
        function initializeGame() {
            score = 0;
            scoreDisplay.textContent = `Skor: ${score}`;
            gameGrid = Array(GRID_ROWS).fill(0).map(() => Array(GRID_COLS).fill(0)); // Grid kosong

            gameGridElement.innerHTML = ''; // Bersihkan grid HTML
            for (let i = 0; i < GRID_CELLS_COUNT; i++) {
                const cell = document.createElement('div');
                cell.classList.add('grid-cell');
                cell.dataset.index = i; // Untuk identifikasi saat drag
                gameGridElement.appendChild(cell);
            }
            updateGridDisplay();
            generateNewBlocks();
            gameOverlay.classList.add('hidden');
        }

        // --- Fungsi Rendering ---
        function updateGridDisplay() {
            const cells = gameGridElement.children;
            for (let r = 0; r < GRID_ROWS; r++) {
                for (let c = 0; c < GRID_COLS; c++) {
                    const cellIndex = r * GRID_COLS + c;
                    const cellElement = cells[cellIndex];
                    if (gameGrid[r][c] !== 0) {
                        cellElement.classList.add('occupied');
                        // Tambahkan kelas warna jika perlu
                        cellElement.classList.add(gameGrid[r][c]);
                    } else {
                        cellElement.classList.remove('occupied');
                        // Hapus semua kelas warna yang mungkin ada
                        cellElement.classList.forEach(className => {
                            if (className.startsWith('color-')) {
                                cellElement.classList.remove(className);
                            }
                        });
                    }
                }
            }
        }

        function drawBlockPreview() {
            blockPreviewSlots.forEach((slot, index) => {
                slot.innerHTML = ''; // Bersihkan slot
                slot.classList.remove('dragging'); // Hapus class dragging
                if (currentBlocks[index]) {
                    const blockContainer = document.createElement('div');
                    blockContainer.classList.add('draggable-block-container');
                    // Tentukan ukuran grid internal untuk preview blok
                    blockContainer.style.gridTemplateColumns = `repeat(${currentBlocks[index].shape[0].length}, 20px)`;
                    
                    currentBlocks[index].shape.forEach(row => {
                        row.forEach(cell => {
                            const piece = document.createElement('div');
                            if (cell === 1) {
                                piece.classList.add('block-piece');
                                piece.classList.add(currentBlocks[index].color);
                            }
                            blockContainer.appendChild(piece);
                        });
                    });
                    slot.appendChild(blockContainer);
                    slot.dataset.blockIndex = index; // Simpan index blok di slot
                }
            });
        }

        // --- Logika Game ---
        function generateNewBlocks() {
            // Jika ada blok yang sudah ditempatkan (null), jangan generate ulang slot itu
            const allSlotsEmpty = currentBlocks.every(block => block === null);
            if (allSlotsEmpty || currentBlocks.length === 0) { // Hanya generate 3 blok baru jika semua slot kosong
                currentBlocks = [];
                for (let i = 0; i < 3; i++) {
                    const randomIndex = Math.floor(Math.random() * BLOCK_SHAPES.length);
                    const newBlock = JSON.parse(JSON.stringify(BLOCK_SHAPES[randomIndex])); // Deep copy
                    currentBlocks.push(newBlock);
                }
            }
            drawBlockPreview();
            checkGameOver(); // Periksa game over setelah blok baru dibuat/ditempatkan
        }

        function placeBlock(block, startRow, startCol) {
            if (!canPlaceBlock(block, startRow, startCol)) {
                return false;
            }

            block.shape.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell === 1) {
                        gameGrid[startRow + r][startCol + c] = block.color; // Simpan warna blok
                    }
                });
            });
            return true;
        }

        function canPlaceBlock(block, startRow, startCol) {
            let isValid = true;
            block.shape.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell === 1) {
                        const targetRow = startRow + r;
                        const targetCol = startCol + c;

                        if (
                            targetRow < 0 || targetRow >= GRID_ROWS ||
                            targetCol < 0 || targetCol >= GRID_COLS ||
                            gameGrid[targetRow][targetCol] !== 0
                        ) {
                            isValid = false;
                        }
                    }
                });
            });
            return isValid;
        }

        function clearLines() {
            let cellsToClear = []; // Menggunakan Set untuk menghindari duplikat secara otomatis
            let linesClearedCount = 0;

            // Cek baris penuh
            for (let r = 0; r < GRID_ROWS; r++) {
                let isRowFull = true;
                for (let c = 0; c < GRID_COLS; c++) {
                    if (gameGrid[r][c] === 0) {
                        isRowFull = false;
                        break;
                    }
                }
                if (isRowFull) {
                    linesClearedCount++;
                    for (let c = 0; c < GRID_COLS; c++) {
                        cellsToClear.push({ r: r, c: c });
                    }
                }
            }

            // Cek kolom penuh
            for (let c = 0; c < GRID_COLS; c++) {
                let isColFull = true;
                for (let r = 0; r < GRID_ROWS; r++) {
                    if (gameGrid[r][c] === 0) {
                        isColFull = false;
                        break;
                    }
                }
                if (isColFull) {
                    linesClearedCount++;
                    for (let r = 0; r < GRID_ROWS; r++) {
                        cellsToClear.push({ r: r, c: c });
                    }
                }
            }

            // Convert cellsToClear to a Set to get unique cells
            const uniqueCells = new Set(cellsToClear.map(cell => JSON.stringify(cell)));
            const finalCellsToClear = Array.from(uniqueCells).map(cell => JSON.parse(cell));

            if (finalCellsToClear.length > 0) {
                // Animasi pembersihan (opsional, bisa lebih kompleks)
                finalCellsToClear.forEach(cell => {
                    const cellElement = gameGridElement.children[cell.r * GRID_COLS + cell.c];
                    cellElement.style.transition = 'background-color 0.2s ease-out';
                    cellElement.style.backgroundColor = '#ecf0f1'; // Flash putih
                });

                setTimeout(() => {
                    finalCellsToClear.forEach(cell => {
                        gameGrid[cell.r][cell.c] = 0; // Bersihkan blok dari grid
                        const cellElement = gameGridElement.children[cell.r * GRID_COLS + cell.c];
                        cellElement.style.transition = ''; // Reset transisi
                        cellElement.style.backgroundColor = ''; // Reset warna
                    });
                    updateGridDisplay();

                    // Aturan skor: 10 poin per blok yang dihapus, bonus untuk multiple lines
                    score += finalCellsToClear.length * 10;
                    if (linesClearedCount > 1) {
                        score += (linesClearedCount - 1) * 50; // Bonus untuk lebih dari 1 baris/kolom
                    }
                    scoreDisplay.textContent = `Skor: ${score}`;
                    checkIfAllBlocksPlaced(); // Periksa apakah perlu blok baru setelah pembersihan
                }, 300); // Penundaan untuk animasi
            } else {
                checkIfAllBlocksPlaced(); // Periksa apakah perlu blok baru jika tidak ada yang dihapus
            }
        }

        function checkIfAllBlocksPlaced() {
            if (currentBlocks.every(b => b === null)) {
                generateNewBlocks();
            } else {
                checkGameOver(); // Cek game over setelah blok ditempatkan dan tidak ada penghapusan
            }
        }


        function checkGameOver() {
            // Cek apakah ada blok yang tersisa yang bisa ditempatkan
            const canMove = currentBlocks.some(block => {
                if (!block) return false; // Abaikan slot kosong

                for (let r = 0; r < GRID_ROWS; r++) {
                    for (let c = 0; c < GRID_COLS; c++) {
                        if (canPlaceBlock(block, r, c)) {
                            return true;
                        }
                    }
                }
                return false;
            });

            if (!canMove && currentBlocks.some(b => b !== null)) { // Jika tidak bisa menempatkan blok dan masih ada blok di preview
                endGame('GAME OVER! Tidak ada ruang untuk blok!');
            }
        }

        function endGame(message) {
            overlayMessage.textContent = message;
            gameOverlay.classList.remove('hidden');
        }

        // --- Logika Drag & Drop ---
        let currentDragCell = null; // Sel grid tempat mouse berada saat ini
        let currentGhostCells = []; // Sel-sel yang di-highlight untuk pratinjau

        function updateGhostBlocks(block, startRow, startCol) {
            clearGhostBlocks(); // Bersihkan yang sebelumnya

            const canPlace = canPlaceBlock(block, startRow, startCol);

            block.shape.forEach((row, r) => {
                row.forEach((cell, c) => {
                    if (cell === 1) {
                        const targetRow = startRow + r;
                        const targetCol = startCol + c;
                        const cellIndex = targetRow * GRID_COLS + targetCol;
                        const targetElement = gameGridElement.children[cellIndex];

                        if (targetElement) { // Pastikan elemen ada di DOM
                            if (canPlace) {
                                targetElement.classList.add('highlight');
                            } else {
                                targetElement.classList.add('invalid');
                            }
                            currentGhostCells.push(targetElement);
                        }
                    }
                });
            });
        }

        function clearGhostBlocks() {
            currentGhostCells.forEach(cell => {
                cell.classList.remove('highlight');
                cell.classList.remove('invalid');
            });
            currentGhostCells = [];
        }

        // Mulai Drag (Mouse Down pada slot blok)
        blockPreviewSlots.forEach((slot, index) => {
            slot.addEventListener('mousedown', (e) => {
                if (!currentBlocks[index] || e.button !== 0 || gameOverlay.classList.contains('hidden') === false) return; // Hanya klik kiri & saat game tidak over

                draggedBlock = currentBlocks[index];
                draggedBlockIndex = index;
                slot.classList.add('dragging');

                // Buat elemen "ghost" yang mengikuti mouse
                ghostElement = document.createElement('div');
                ghostElement.classList.add('draggable-block-container');
                ghostElement.classList.add('ghost');
                ghostElement.style.gridTemplateColumns = `repeat(${draggedBlock.shape[0].length}, 20px)`;
                
                draggedBlock.shape.forEach(row => {
                    row.forEach(cell => {
                        const piece = document.createElement('div');
                        if (cell === 1) {
                            piece.classList.add('block-piece');
                            piece.classList.add(draggedBlock.color);
                        }
                        ghostElement.appendChild(piece);
                    });
                });
                document.body.appendChild(ghostElement);

                // Update posisi ghost awal
                updateGhostPosition(e.clientX, e.clientY);
            });
        });

        // Gerakan Drag (Mouse Move)
        document.addEventListener('mousemove', (e) => {
            if (draggedBlock && ghostElement) {
                updateGhostPosition(e.clientX, e.clientY);

                const targetCell = e.target.closest('.grid-cell');
                if (targetCell) {
                    const cellIndex = parseInt(targetCell.dataset.index);
                    const startRow = Math.floor(cellIndex / GRID_COLS);
                    const startCol = cellIndex % GRID_COLS;
                    if (currentDragCell !== targetCell) {
                        currentDragCell = targetCell;
                        updateGhostBlocks(draggedBlock, startRow, startCol);
                    }
                } else {
                    clearGhostBlocks();
                    currentDragCell = null;
                }
            }
        });

        function updateGhostPosition(x, y) {
            if (ghostElement) {
                ghostElement.style.left = `${x}px`;
                ghostElement.style.top = `${y}px`;
            }
        }

        // Akhir Drag (Mouse Up)
        document.addEventListener('mouseup', (e) => {
            if (draggedBlock) {
                blockPreviewSlots[draggedBlockIndex].classList.remove('dragging');
                
                if (ghostElement) {
                    ghostElement.remove();
                    ghostElement = null;
                }
                clearGhostBlocks();

                const targetCell = e.target.closest('.grid-cell');
                if (targetCell) {
                    const cellIndex = parseInt(targetCell.dataset.index);
                    const startRow = Math.floor(cellIndex / GRID_COLS);
                    const startCol = cellIndex % GRID_COLS;

                    if (placeBlock(draggedBlock, startRow, startCol)) {
                        currentBlocks[draggedBlockIndex] = null; // Hapus blok dari preview
                        drawBlockPreview(); // Update tampilan preview
                        updateGridDisplay(); // Update tampilan grid
                        clearLines(); // Cek dan bersihkan baris/kolom
                    }
                }
                draggedBlock = null;
                draggedBlockIndex = -1;
            }
        });

        // Restart Game
        restartButton.addEventListener('click', initializeGame);

        // Inisialisasi game saat halaman dimuat
        initializeGame();
    </script>
</body>
</html>
