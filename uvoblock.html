<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>UvoBlock Game</title>
    <style>
        body {
            margin: 0;
            overflow-x: hidden; /* Prevent horizontal scrolling */
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensure body takes full viewport height */
            background-color: #222; /* Darker background for the entire page */
            color: #eee;
        }

        #game-container {
            flex-grow: 1; /* Allow game container to take available space */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: #333; /* Darker background for the game area */
            background-image: linear-gradient(45deg, #2a2a2a 25%, transparent 25%),
                              linear-gradient(-45deg, #2a2a2a 25%, transparent 25%),
                              linear-gradient(45deg, transparent 75%, #2a2a2a 75%),
                              linear-gradient(-45deg, transparent 75%, #2a2a2a 75%);
            background-size: 40px 40px;
            background-position: 0 0, 0 20px, 20px -20px, -20px 0px;
        }

        #game-board {
            display: grid;
            border: 2px solid #555;
            background-color: #444;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.7);
        }

        .grid-cell {
            width: 30px; /* Base size, adjusted by JS for responsiveness */
            height: 30px; /* Base size, adjusted by JS for responsiveness */
            border: 1px solid rgba(0, 0, 0, 0.2);
            background-color: #555;
        }

        .grid-cell.filled {
            background-color: #888; /* Default filled color */
        }

        #block-selection {
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align items to the top to prevent cropping */
            margin-top: 20px;
            padding: 10px;
            background-color: #3d3d3d;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            flex-wrap: wrap; /* Allow wrapping on smaller screens */
        }

        .block-preview-container {
            margin: 10px;
            padding: 5px;
            border: 2px solid #555;
            background-color: #4a4a4a;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .block-preview-container:hover {
            transform: translateY(-3px);
            border-color: #aaa;
        }

        .block-preview-container.selected {
            border-color: #00bcd4; /* Highlight selected block */
            box-shadow: 0 0 8px rgba(0, 188, 212, 0.7);
        }

        .block-preview {
            display: grid;
            background-color: #555;
            border: 1px solid #777;
        }

        .block-cell {
            width: 15px; /* Smaller cells for preview */
            height: 15px;
            background-color: #00bcd4; /* Example block color */
            border: 1px solid rgba(0, 0, 0, 0.1);
        }

        #score-display {
            margin-top: 15px;
            font-size: 1.5em;
            color: #00bcd4;
            text-shadow: 0 0 5px rgba(0, 188, 212, 0.5);
        }

        /* Mobile specific adjustments */
        @media (max-width: 768px) {
            .grid-cell {
                width: calc((100vw - 40px) / 10); /* Adjust dynamically for small screens */
                height: calc((100vw - 40px) / 10); /* Keep aspect ratio */
                max-width: 25px; /* Cap size on very small screens */
                max-height: 25px;
            }

            #block-selection {
                flex-direction: row; /* Keep row direction for easier horizontal scrolling if needed */
                overflow-x: auto; /* Allow horizontal scrolling for blocks if they overflow */
                justify-content: flex-start; /* Align blocks to start if scrolling */
                padding-bottom: 10px; /* Add padding to prevent cropping on bottom */
            }

            .block-preview-container {
                min-width: 80px; /* Ensure a minimum width for touch targets */
                min-height: 80px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            .block-cell {
                width: 12px;
                height: 12px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <h1>UvoBlock Game</h1>
        <div id="game-board"></div>
        <div id="block-selection"></div>
        <div id="score-display">Score: 0</div>
    </div>
    <script src="uvoblock.js"></script>
</body>
</html>
